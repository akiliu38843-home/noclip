<!-- ============================================================
     NOCLIP shared narrative helper · Sprint 1
     · handle 持久身份 / 门数 / 时钟 / 余温 / 自见
============================================================ -->
<script>
(function(){
  const LS = window.localStorage;
  // 1. handle: 自动生成持久 4 位 guest_XXXX
  function getHandle() {
    let h = LS.getItem('noclip-handle');
    if (!h) {
      h = 'guest_' + Math.floor(Math.random() * 9000 + 1000);
      LS.setItem('noclip-handle', h);
    }
    return h;
  }
  // 2. 门数: 主 index 写入 noclip-door-count, 房间只读
  function getDoorCount() {
    return parseInt(LS.getItem('noclip-door-count') || '1', 10);
  }
  // 3. session 起始时间 (NOCLIP 共用时钟基)
  function getSessionStart() {
    let s = LS.getItem('noclip-session-start');
    if (!s) {
      // 永远从 03:14 AM 开始 (NOCLIP 时间, 不是真时间)
      s = Date.now().toString();
      LS.setItem('noclip-session-start', s);
    }
    return parseInt(s, 10);
  }
  // 4. 共用时钟: 起始 03:14 AM + 每扇门 +N 分钟 (+ 实际经过时间)
  function getNoclipTime() {
    const sessionMin = (Date.now() - getSessionStart()) / 60000;
    const doorMin = getDoorCount() * 4;  // 每扇门 +4 分钟
    const totalMin = 3 * 60 + 14 + sessionMin + doorMin;
    const h = Math.floor(totalMin / 60) % 24;
    const m = Math.floor(totalMin) % 60;
    return {
      h: h, m: m,
      str: String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'),
      ampm: (h < 12 ? 'AM' : 'PM'),
      ampm_str: ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h < 12 ? 'AM' : 'PM')
    };
  }
  // 5. 余温: 记录访问 + 取上次访问
  function logVisit(roomId) {
    const key = 'noclip-visits-' + roomId;
    const visits = JSON.parse(LS.getItem(key) || '[]');
    visits.push(Date.now());
    if (visits.length > 20) visits.shift();
    LS.setItem(key, JSON.stringify(visits));
  }
  function getVisitInfo(roomId) {
    const visits = JSON.parse(LS.getItem('noclip-visits-' + roomId) || '[]');
    return {
      count: visits.length,
      lastBefore: visits.length > 1 ? visits[visits.length - 2] : null,
      isReturn: visits.length > 1
    };
  }
  function formatTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hr ago';
    return Math.floor(hr / 24) + ' day ago';
  }

  // 暴露到 window
  window.NOCLIP = {
    handle: getHandle(),
    doorCount: getDoorCount(),
    sessionStart: getSessionStart(),
    time: getNoclipTime(),
    logVisit: logVisit,
    visitInfo: getVisitInfo,
    timeAgo: formatTimeAgo,
    // 重计算时钟 (跨长会话)
    refreshTime: function() { this.time = getNoclipTime(); return this.time; }
  };
})();
</script>

/*
  JSZM - JavaScript implementation of Z-machine
  This program is in public domain.

  Documentation:

  The exported function called JSZM is the constructor, which takes a
  Uint8Array as input. You can also use JSZM.Version for the version
  number which is object with properties: major, minor, subminor,
  timestamp. Properties of JSZM instances are:

  .highlight(fixpitch) = A generator function you define, which will be
  called to update the highlighting mode, which is fixpitch (if the
  argument is true) or normal (if argument is false). (You don't have to
  set it if you aren't implementing variable pitch by default.)

  .isTandy = A boolean, normally false. Set it to true to tell the game
  that it is a Tandy computer; this affects some games.

  .print(text,scripting) = A generator function that you must define, and
  will be called to print text. You must implement wrapping and buffering
  and scripting yourself. The second argument is true if it should be
  copied to the transcript or false if it should not be.

  .read(maxlen) = A generator function which you must define yourself, and
  which should return a string containing the player's input. Called when

<script>
const GAME = { key: "Dark_Pit", title: "Dark Pit" };
const RITUAL_LINES = [["> attempting connection to <unknown> ...", "dim"], ["> CONNECT 14400 (no echo)", "red"], ["// dark pit terminal \u00b7 \u4e0d\u5e94\u6709\u4eba\u5728\u7ebf \u00b7 2026 \u63d0\u4ea4", "dim"]];
const SUB_TITLE = "no records of entry \u00b7 no records of exit";

const screen = document.getElementById('screen');
const promptEl = document.getElementById('prompt');
const inputEl = document.getElementById('input');

function escHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[c]));
}
function append(text, cls) {
  if (cls) screen.innerHTML += '<span class="' + cls + '">' + escHtml(text) + '</span>';
  else screen.innerHTML += escHtml(text);
  window.scrollTo(0, document.body.scrollHeight);
}
function appendRaw(html) {
  screen.innerHTML += html;
  window.scrollTo(0, document.body.scrollHeight);
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function showRitualAndStart() {
  appendRaw('\n<span class="br">' + escHtml(GAME.title) + '</span> · <span class="dim">' + escHtml(SUB_TITLE) + '</span>\n\n');
  for (const [text, cls] of RITUAL_LINES) {
    await sleep(450 + Math.random() * 250);
    append(text + '\n', cls);
  }
  await sleep(700);
  appendRaw('\n<span class="dim">[ initializing Z-machine ... ]</span>\n\n');
  startGame();
}

function startGame() {
  document.getElementById('status-time').textContent = '~~ loading ~~';
  let bytes;
  try {
    const binStr = atob(Z3_B64);
    bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
  } catch (e) {
    appendRaw('<span class="red">[ FAILED: ' + escHtml(e.message) + ' ]</span>\n');
    return;
  }

  const game = new JSZM(bytes);
  let inputResolver = null;
  function waitForInput() {
    return new Promise(r => {
      inputResolver = r;
      promptEl.style.display = 'flex';
      inputEl.focus();
    });
  }
  inputEl.onkeydown = (e) => {
    if (e.key === 'Enter' && inputResolver) {
      const v = inputEl.value;
      appendRaw('<span class="player">&gt; ' + escHtml(v) + '</span>\n');
      inputEl.value = '';
      promptEl.style.display = 'none';
      const r = inputResolver; inputResolver = null; r(v);
    }
  };

  game.print = function*(text, scripting) { append(text); };
  game.read = function*(maxlen) {
    const v = yield waitForInput();
    return (v || '').slice(0, maxlen || 120);
  };
  game.save = function*(buf) {
    try {
      localStorage.setItem('noclip-zork-' + GAME.key, JSON.stringify(Array.from(buf)));
      append('\n[ save ok ]\n', 'dim'); return true;
    } catch(e) { append('\n[ save failed ]\n', 'red'); return false; }
  };
  game.restore = function*() {
    try {
      const arr = JSON.parse(localStorage.getItem('noclip-zork-' + GAME.key));
      if (!arr) { append('\n[ no save ]\n', 'red'); return null; }
      append('\n[ restored ]\n', 'dim');
      return new Uint8Array(arr);
    } catch(e) { append('\n[ restore failed ]\n', 'red'); return null; }
  };

  const runner = game.run();
  document.getElementById('status-time').textContent = '~~ in story ~~';

  async function pump(value) {
    let r;
    try { r = runner.next(value); }
    catch (e) {
      append('\n[ runtime error: ' + e.message + ' ]\n', 'red');
      console.error(e); return;
    }
    if (r.done) {
      document.getElementById('status-time').textContent = '~~ ended ~~';
      append('\n\n[ Z-machine halted. ESC to exit. ]\n', 'dim');
      return;
    }
    const v = r.value;
    if (v && typeof v.then === 'function') { await pump(await v); }
    else { setTimeout(() => pump(v), 0); }
  }
  pump(undefined);
}

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'if-' + GAME.key }, '*');
  } else {
    if (confirm('QUIT and leave?')) window.close();
  }
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitRoom();
});

showRitualAndStart();
</script>
