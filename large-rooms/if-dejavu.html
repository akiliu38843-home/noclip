* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #050810; color: #80a0ff;
  font-family: 'WebVGA', 'PxPlus IBM VGA8', 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
  font-size: 14px; line-height: 1.45; min-height: 100vh;
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(80,120,255,0.04) 2px, rgba(80,120,255,0.04) 3px),
    radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%);
  z-index: 998; mix-blend-mode: multiply;
}
.term { max-width: 760px; margin: 0 auto; padding: 16px 16px 80px; min-height: 100vh; position: relative; }
.status-top {
  border-bottom: 1px solid #2a5a3a; padding: 4px 6px; font-size: 11px; color: #80a0ff;
  display: flex; justify-content: space-between; margin-bottom: 10px;
}
.status-bot {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #050810; border-top: 1px solid #2a5a3a; padding: 6px 14px;
  font-size: 11px; color: #80a0ff; display: flex; justify-content: space-between; z-index: 100;
}
.screen {
  white-space: pre-wrap; word-wrap: break-word; font-family: inherit;
  font-size: inherit; line-height: inherit; color: #80a0ff;
}
.screen .dim { color: rgba(255,255,255,0.35); }
.screen .br { color: #a0c0ff; }
.screen .yel { color: #ffd040; }
.screen .red { color: #ff5050; }
.screen .player { color: #80c0ff; }
.prompt {
  display: flex; align-items: center; gap: 8px; margin-top: 8px; color: #ffd040;
  position: sticky; bottom: 36px; background: #050810; padding-top: 6px;
}
.prompt::before { content: '>'; }
.prompt input {
  background: transparent; border: none; color: #80c0ff;
  font: inherit; outline: none; flex: 1; caret-color: transparent;
}
.cursor-blink {
  display: inline-block; width: 8px; height: 14px; background: #ffd040;
  vertical-align: text-bottom; animation: blink 0.7s steps(2,start) infinite;
}
@keyframes blink { to { opacity: 0; } }
.exit-hint {
  position: fixed; top: 10px; right: 10px;
  background: #050810; border: 1px solid #2a5a3a; color: #80a0ff;
  font: 11px inherit; padding: 4px 10px; cursor: pointer; z-index: 101; font-family: inherit;
}
.exit-hint:hover { background: #80a0ff; color: #050810; }
@media (max-width: 720px) { .term { padding: 10px 10px 70px; max-width: 100%; } html { font-size: 12px; } }
</style>
</head>
<body>

<button class="exit-hint" onclick="exitRoom()" title="QUIT to leave">[QUIT]</button>

<div class="term">
  <div class="status-top">
    <span>déjà vu · 1997</span>
    <span id="status-time">~~ jszm idle ~~</span>
  </div>
  <div class="screen" id="screen"></div>
  <div class="prompt" id="prompt" style="display:none;">
    <input id="input" type="text" maxlength="120" autocomplete="off" spellcheck="false">
    <span class="cursor-blink"></span>
  </div>
</div>

<div class="status-bot">
  <span>~ IF Archive · Anonymous · 1997 · IF Archive freeware ~</span>
  <span>commands: LOOK · WAIT · REMEMBER · WAKE</span>
</div>

<script>
/*
  JSZM - JavaScript implementation of Z-machine
  This program is in public domain.

  Documentation:

  The exported function called JSZM is the constructor, which takes a
  Uint8Array as input. You can also use JSZM.Version for the version
  number which is object with properties: major, minor, subminor,
  timestamp. Properties of JSZM instances are:

  .highlight(fixpitch) = A generator function you define, which will be
  called to update the highlighting mode, which is fixpitch (if the
  argument is true) or normal (if argument is false). (You don't have to
  set it if you aren't implementing variable pitch by default.)

  .isTandy = A boolean, normally false. Set it to true to tell the game
  that it is a Tandy computer; this affects some games.

  .print(text,scripting) = A generator function that you must define, and
  will be called to print text. You must implement wrapping and buffering
  and scripting yourself. The second argument is true if it should be
  copied to the transcript or false if it should not be.

  .read(maxlen) = A generator function which you must define yourself, and
  which should return a string containing the player's input. Called when
  a READ instruction is executed; the argument is the maximum number of
  characters that are allowed (if you return a longer string, it will be
  truncated).

  .restarted() = A generator function you can optionally define. When the
  game starts or if restarted (with the RESTART instruction), it will be
  called after memory is initialized but before executing any more.

  .restore() = A generator function you can define yourself, which is
  called when restoring a saved game. Return a Uint8Array with the same
  contents passed to save() if successful, or you can return false or null
  or undefined if it failed.

  .run() = A generator function. Call it to run the program from the
  beginning, and call the next() method of the returned object to begin
  and to continue. This generator may call your own generator functions
  which may yield; it doesn't otherwise yield by itself. You must set up
  the other methods before calling run so that it can properly set up the
  contents of the Z-machine mode byte. This generator only finishes when a
  QUIT instruction is executed.

  .save(buf) = A generator function you can define yourself, and is called
  when saving the game. The argument is a Uint8Array, and you should
  attempt to save its contents somewhere, and then return true if
  successful or false if it failed.

  .serial = The serial number of the story file, as six ASCII characters.

  .screen(window) = Normally null. You can set it to a generator function
  which will be called when the SCREEN opcode is executed if you want to
  implement split screen.

  .split(height) = Normally null. You can set it to a generator function
  which will be called when the SPLIT opcode is executed if you want to
  implement split screen.

  .statusType = False for score/moves and true for hours/minutes. Use this
  to determine the meaning of arguments to updateStatusLine.

  .updateStatusLine(text,v18,v17) = Normally null, but can be a generator
  function if you are implementing the status line. It is called when a
  READ or USL instruction is executed. See statusType for the meaning of
  v18 and v17. Return value is unused.

  .verify() = A normal function. Calling it will attempt to verify the
  story file, and returns true if successful or false on error. You can
  override it with your own verification function if you want to.

  .zorkid = The ZORKID of the story file. This is what is normally
  displayed as the release number.
*/

"use strict";

const JSZM_Version={major:2,minor:0,subminor:2,timestamp:1480624305074};

function JSZM(arr) {
  var mem;
  mem=this.memInit=new Uint8Array(arr);
  if(mem[0]!=3) throw new Error("Unsupported Z-code version.");

  this.statusType=!!(mem[1]&2);

    g16=()=>(e+=2,vi.getUint16(e-2));
    g24=()=>(e+=3,vi.getUint32(e-4)&0xFFFFFF);
    g32=()=>(e+=4,vi.getUint32(e-4));

      e=purbot=this.getu(14);
      vi=new DataView(ar.buffer);

      cs=new Array(g16());
      ds=Array.from({length:g16()},g16s);
      for(i=0;i<cs.length;i++) {
        cs[i]={};
        cs[i].local=new Int16Array(g8());
        cs[i].pc=g24();
        cs[i].ds=Array.from({length:g16()},g16s);

<script>
const GAME = { key: "dejavu", title: "D\u00e9j\u00e0 Vu" };
const RITUAL_LINES = [["d\u00e9j\u00e0 vu...", "dim"], ["d\u00e9j\u00e0 vu...", "dim"], ["d\u00e9j\u00e0 vu... wait. haven't we been here before?", "br"], ["// 1997 \u5e74\u63d0\u4ea4 \u00b7 \u91cd\u590d\u68a6\u5883\u611f", "dim"]];
const SUB_TITLE = "wait. haven't we been here before?";

const screen = document.getElementById('screen');
const promptEl = document.getElementById('prompt');
const inputEl = document.getElementById('input');

function escHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[c]));
}
function append(text, cls) {
  if (cls) screen.innerHTML += '<span class="' + cls + '">' + escHtml(text) + '</span>';
  else screen.innerHTML += escHtml(text);
  window.scrollTo(0, document.body.scrollHeight);
}
function appendRaw(html) {
  screen.innerHTML += html;
  window.scrollTo(0, document.body.scrollHeight);
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function showRitualAndStart() {
  appendRaw('\n<span class="br">' + escHtml(GAME.title) + '</span> · <span class="dim">' + escHtml(SUB_TITLE) + '</span>\n\n');
  for (const [text, cls] of RITUAL_LINES) {
    await sleep(450 + Math.random() * 250);
    append(text + '\n', cls);
  }
  await sleep(700);
  appendRaw('\n<span class="dim">[ initializing Z-machine ... ]</span>\n\n');
  startGame();
}

function startGame() {
  document.getElementById('status-time').textContent = '~~ loading ~~';
  let bytes;
  try {
    const binStr = atob(Z3_B64);
    bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
  } catch (e) {
    appendRaw('<span class="red">[ FAILED: ' + escHtml(e.message) + ' ]</span>\n');
    return;
  }

  const game = new JSZM(bytes);
  let inputResolver = null;
  function waitForInput() {
    return new Promise(r => {
      inputResolver = r;
      promptEl.style.display = 'flex';
      inputEl.focus();
    });
  }
  inputEl.onkeydown = (e) => {
    if (e.key === 'Enter' && inputResolver) {
      const v = inputEl.value;
      appendRaw('<span class="player">&gt; ' + escHtml(v) + '</span>\n');
      inputEl.value = '';
      promptEl.style.display = 'none';
      const r = inputResolver; inputResolver = null; r(v);
    }
  };

  game.print = function*(text, scripting) { append(text); };
  game.read = function*(maxlen) {
    const v = yield waitForInput();
    return (v || '').slice(0, maxlen || 120);
  };
  game.save = function*(buf) {
    try {
      localStorage.setItem('noclip-zork-' + GAME.key, JSON.stringify(Array.from(buf)));
      append('\n[ save ok ]\n', 'dim'); return true;
    } catch(e) { append('\n[ save failed ]\n', 'red'); return false; }
  };
  game.restore = function*() {
    try {
      const arr = JSON.parse(localStorage.getItem('noclip-zork-' + GAME.key));
      if (!arr) { append('\n[ no save ]\n', 'red'); return null; }
      append('\n[ restored ]\n', 'dim');
      return new Uint8Array(arr);
    } catch(e) { append('\n[ restore failed ]\n', 'red'); return null; }
  };

  const runner = game.run();
  document.getElementById('status-time').textContent = '~~ in story ~~';

  async function pump(value) {
    let r;
    try { r = runner.next(value); }
    catch (e) {
      append('\n[ runtime error: ' + e.message + ' ]\n', 'red');
      console.error(e); return;
    }
    if (r.done) {
      document.getElementById('status-time').textContent = '~~ ended ~~';
      append('\n\n[ Z-machine halted. ESC to exit. ]\n', 'dim');
      return;
    }
    const v = r.value;
    if (v && typeof v.then === 'function') { await pump(await v); }
    else { setTimeout(() => pump(v), 0); }
  }
  pump(undefined);
}

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'if-' + GAME.key }, '*');
  } else {
    if (confirm('QUIT and leave?')) window.close();
  }
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitRoom();
});

showRitualAndStart();
</script>
