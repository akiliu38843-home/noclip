.terminal {

.screen {

.cursor-blink {

  vertical-align: text-bottom;

.menu-item {

.menu-item:hover { background: #4af04a; color: #050505; }
.menu-item .key { color: #ffd040; font-weight: bold; }

.viewer-nav a {

.viewer-nav a:hover { color: #4af04a; }

@media (max-width: 720px) {

 1,\r\n*   (7) Chapter 2\r\n*   (8) chapter 2... continued\r\n*   (9) chapter 2 continued..... \r\n*  (10) chapter 2, continued.\r\n\r\n1/24: Introduction.\r\nName: Black Feather #420\r\nDate: Sat Aug 04 21:08:26 1990\r\n\r\nThis room is going to contain a story I started at age 11.  Back then, it was \r\nthe War of the Mice.  A very silly childish story written by myself, and \r\nfriends.  (John Gulden, Jeff Latvala, and Scott Jorgenson).  A year later, we \r\nconcentrated our efforts, and started a science fiction, bored with our \r\nswashbuckling adventurers from our first book.  We started Vampires, and \r\nMythological creatures, Lured by our English teacher, Michael Smith, into the \r\nrealms of fantasy, and the unknown.\r\n\r\nAnother year seperated us, and I started on my own.  Published an article, and \r\nfelt like I could conquer the world.  I wrote of a fantastic heroin, the core \r\nof my self esteem, and set her with elves, and vampires, riding a great black \r\nstallion, Half dragon, half winged horse.  She was at first a slave, in love \r\nwith her liege, and kidnapped by a cruel lord.\r\n\r\nI dropped that line.  It all seemed too silly.  I put her in a world of \r\nGenetics, spaceships, and soul mates.  The liege became her brother, and the \r\nlord her lover.  She was a child of the Gods.  \r\n\r\nI am finishing that story now.  But the old one came back to me, 11 yrs later. \r\nThanks to Raymond E. Stienke Greyman, I brought the old story back, the \r\ncharacter  became a dark elf, harboring the soul of the princess from the \r\nscience realm.  The lord was still the same, and the liege, a prince in love \r\nwith her.  \r\n\r\nLady AnneAketira Samrii Taborre, Warlord of the Vampyric People, Last Princes \r\nof the Royalle House of the Rassonian Empire, split into 2 different worlds.  \r\nOne through Dungeons and Dragons, and the other, through that world of science \r\nthat she has aged so well in.\r\n\r\nThe following posts in this room, deal with her.  From her freedom to slavery, \r\nuntil her death.  Almost all of the character names are the same.  The story \r\nline is the one copyrighted in 1980.  This is it's first publication, in rough \r\nform, and thus, it has a double copyright, August 4th, 1990.\r\n\r\nSpecial thanks to:\r\n               Raymond E. Stienke Greyman\r\n               Ironfist, sysop of Magick\r\n               Dadge, my first DM\r\n               Richard Kittock, my writing instructor\r\n               Micheal Smith\r\n               SkyWise, from my first game\r\n               F'lar\r\n   \r\n               and God, for making this all possible.\r\n\r\n\r\n\r\n2/24: Eclipse, Dance of the Sabres\r\nName: Black Feather #420\r\nDate: Sat Aug 04 21:38:05 1990\r\n\r\n         copyright 1980, 1990   Christine Shearer, Hiller, Rietsch\r\n\r\n=============================================================================== \r\nThe wind whispered in the trees of the forest clearing, giving the un-named \r\nslave girl pleasure that only the forest dwellers could know.  This was the \r\nday of her meeting with the tribal lord.  She was nervous, but the calm wind \r\neased her apprehension.\r\n\r\nToday, she would get a name.\r\n\r\nMany of the Elves taunted her, because it was a social crime, not to know, or \r\nhave a name.  If you didn't have a soul name, it was a punishment worthy of \r\nslavery, or death, dependant apon the whims of the parties present.  However, \r\nthe Forestae Elvana slaves had no names at all, unless they earned one.\r\n\r\nThe dark haired woman kept walking by the stream.  A name, finally.  After 112 \r\nyears, she would be called something other than Slave Girl, or Dark One.\r\n\r\nDark One reminded her of what the people called the Drow, and she hated them.\r\n\r\nShe looked at her reflection in the water.  Her sky blue eyes grinned back at \r\nher.  She tied back her long waves of black hair, and brushed some dust off of \r\nher dark skin on her arm.  She put in her left ear, the only adornment, or \r\nclothing she was allowed to have, a golden earring given to her by the tribal \r\nmage.  The hoop hung down to her shoulder, and it's point drew a drop of blood \r\nwhen she put it in her earlobe.  She rubbed the ponted tip of her ear, till \r\nthe tingling quit, then jumped in the water.  It was cold, but felt good.  \r\nNumbed her limbs, and numbed her mind.  She scrubbed furiousely with a Taii \r\nleaf, so as to purify herself, then stepped onto the bank.  \r\n\r\nThe girl cast a small flame in the palm of her hand.\r\n\r\n\"For Magic, I live for thee, Mother Earth, and for thine Magic, I die for \r\nthee.\"\r\n\r\nShe put her hand in the water, extinguishing the flame.  That task done, she \r\nstarted back to the village, pure as the morning sky, and ready.  Her soul \r\nwould be read, and her name given.  Four youths from the tribe were naked as \r\nshe, to receive thier names as well.  They had thier own oaths to say to the \r\nGoddess Earth, or Magic as she was called.  One of them was the Ruler's son.  \r\nThe young lad, Silent Song, had been injured as a child, and did not \r\ncommunicate, nor respond to anyone.  The tribe was going to have a ritual \r\nkilling of the boy, because according to Nature, he could not survive.  He was \r\nforce fed, and clothed daily, by his father.\r\n\r\nThe girl remembered when she had secretely reading the books of magic, even \r\nwhen she couldn't read.  The boy found her in a clearing with the sacred \r\nbooks.  She found a patch of sand, knealed before the prince, and drew a \r\npicture of a winged horse in the sand for him.  He looked down, but his eyes \r\ndid not register.  A spell flickered through her mind, and left her mouth \r\nbefore she could stop it.  The boy looked at her, in the eyes.  He stared her \r\ndown, then turned to the copse of trees.\r\n\n    [... 截后 228 行 ...]"}, {"cat": "M", "title": "\"Is It Worth The Trouble?\" · The Eel 退圈告别", "sysop": "The Eel (after NotSoHumble Babe bust)", "year": "1992-02", "body": "\r\n\r\n                       \"Is It Worth the Trouble?\"\r\n\r\n                      -The Eel's Fairwell Address-\r\n\r\n\r\n     As most of you already know, the pirate world has suffered\r\nnumerous blows from the authority.  Started with the major bust of The\r\nNotSoHumble Babe of USA and The Grim Reaper of INC, and the dominoes\r\njust keep collapsing.  A lot of boards are either going down and\r\nconverting to Public Domain, or unfortunate enough to be busted.\r\n\r\n     After a call of warning from Sought After saying that the\r\nauthority is going for every high-profile pirates in threads, I wonder\r\nif this whole thing is worth my life for.  I'm not saying I believe\r\neverything he said, but considering that I'm going to college in a few\r\nmonths and becoming too busy to handle modeming businesses, I can't\r\nstay in modeming world much longer even if I wanted to.  I have a nice\r\npersonal life, a nice circle of friends, and most importantly, a nice\r\nand trusting reputation dubbed by all the people around me.  They think\r\nof me as a good person with good morals, and if modeming corrupts me\r\nany further, I might just well go for a suicide.\r\n\r\n     I'm terribly sorry for leaving, not because that I can't have fun\r\nwith people anymore, but because that I'm leaving a lot of people\r\ndisappointed and alone in the dust.  I had a ton of responsibilities\r\nfrom trainers to magazines to Ansi's, and I know a lot of people are\r\ncounting on me for numerous projects and chores.  You can call me a\r\nwimp or a irresponsible jerk, but I just want to say this:  \"Is this\r\nhobby worth my whole life for?\"\r\n\r\n     I'm not preaching to anyone that they should quit or not, it's\r\nyour own decision.  I'm not just blindly follwing what Sought After\r\ntold me, but I also thought about life as a whole.  There's a long way\r\ndown the road, and there's absolutely no reason to trip and fall off\r\nthe cliff at the age of 17.\r\n\r\n     It's certainly been great in my almost 3 years of modeming.  It\r\ngave me confidence, new skills, another social life, and the taste of\r\npatience and ambition.  It's a great hobby and I'm sorry it had to end\r\nthis way.  I have to go on in the cold, hard real world and spend more\r\ntime on school matters, my job, and everything else that REALLY matters\r\nto me.  It's time to face the facts, time to face the music, and time\r\nto face the ultimate meaning of what life really is.\r\n\r\n     My board, Pool of Radiance, will be down, probably permenantly.\r\nSo please stop calling it.  Here're some people I'd like to say goodbye\r\nto, from the bottom of my heart.  It's been great knowing you guys,\r\ngood luck in your futures.\r\n\r\n     -Rescue Raider:  Sorry RR, it has to end sometimes.  I've done\r\n                      everything I could to help with your awesome\r\n                      trainers.  Someone else would have to pick it up\r\n                      for you.  You're a great person and thanks for\r\n                      all the cheats and trainers you've written for\r\n                      all of us to enjoy.\r\n     -Atz/Golden One/SCD:  Sorry for procrastinating on my articles and\r\n                           Ansi border guys.  I've been awfully busy\r\n                           and I was going to work on them today until\r\n                           I made this decision.  You guys are great\r\n                           scholars and very talented.  Don't let this\r\n                           ruin your bright futures.\r\n     -RaD Man/Black Spyrit/ACiD:  I've only made one Ansi in my ACiD\r\n                                  career but I hope it made a mark in\r\n                                  history.  It's been really swell of\r\n                                  you guys to accept me in after only a\r\n                                  couple months of Ansi experience.\r\n                                  I've done all I could with Ansi and\r\n                                  courier coordination, you guys are\r\n                                  great artists so apply your gifts\r\n                                  wisely.\r\n     -Gnat/Doctor PJ/PoWR:  Sorry I never went to the meetings, it's\r\n                            been great knowing you guys.  Thanks for\r\n                            all the help you people have given me about\r\n                            Telegard and other difficult questions.\r\n     -Line Noise/Cool Hand/INC:  It's been an honor serving for your\r\n                                 trainer division and some INC affairs.\r\n                                 The alliances were fun and although\r\n                                 I'd rather stay and maybe become a\r\n                                 part of INC itself, it's just too bad\r\n                                 that I have to leave at this time.\r\n     -Force Ten:  I guess you're going to lose a major part of your\r\n                  TCSNet now eh Rick?  Thanks for all the things you've\r\n                  done for the network and setting up the net for me.\r\n                  You're a good person, a good writer, and a good\r\n                  administrator.  Just mellow out a bit and good luck.\r\n     -Refractor:  Sorry man I broke my promise of helping you with\r\n                  Paragon.  It's a super piece of BBS software, and I'm\r\n                  sorry I can't stay to see your upcoming new software.\r\n                  You're a great programmer, so use your skills for the\r\n                  best.\r\n     -Sought After:  Thanks for the warning man, I'm glad you told me\r\n                     about this crap.\r\n     -Mr. Cool Dude: Thanks for all the uploadings you've done on my\r\n                      board.  200+ megs in less than half a year is an\r\n                      amazing feat bud.  Thanks again.\r\n     -Crzy Joe:  Well CJ this is it.. I might not revive as many times\r\n                 as you did, but just want you to know that you're a\r\n                 cool guy and it's been great knowing you.\r\n     -JED:  Well bud you're the best ever in Ansi art, and a really\r\n            cool and humble person.  Thanks for the Ansi you did for\r\n            me.\r\n     -Slash:  Later bud, it's been really nice knowing you.  I have to\r\n              say that Soul Asylum is the LD board I called most often.\r\n     -Repo Man:  Thanks for the great deal on the HST.\r\n\r\n\r\n                      **Other Hi's and Bye's to**\r\n\r\n     Fistandantilus, Electric Element, Genesis, The Byter, Sickler,\r\n          Dark Spyre, Nightwing, Dr.Q2, Father Time, Babyface,\r\n        Bloody ButCher, FiRM, Strike Eagle, The Junkman, Daeor,\r\n      Honus Wagner, Frozen Tormentor, Skeleton Secretary, Kingpin,\r\n    Marshal Law, Mystic Warrior, Cemetery Shift, Canseco, Hyperion,\r\n    X-Terminator, Night Ranger, The Gatekeeper, Surak, Opus Outland,\r\n\r\n                                 -and-\r\n\r\n                           Whomever I missed\r\n\n    [... 截后 18 行 ...]"}, {"cat": "F", "title": "The Buzzard's Nest IV · Mac 文件总目录", "sysop": "TBN4 · 1994-12-13", "year": "1994", "body": "The Buzzard's Nest IV Files as of 12/13/94\r\rAvailable Areas And Directories:\r\r 1: TBN4 General\r\r 1:&gt;&gt;UPLOAD FRESH WARES&lt;&lt;\r 2\n:Free Downloads\r 3:PD General\r 4:PD Games\r 5:PD Utilities\r 6:Needs [K]\r 7:Cracks, Patches, &amp; Ser#s\r 8\n:Beta/Prerelease\r 9:TBN4 Requests\r10:TBN4 Exclusives\r\r 2: TBN4 Connectivity\r\r 1\n:General Communication\r 2:Commercial Services\r 3\n:Hermes/Other Hosts\r 4:Internet/Other Nets\r 5\n:BBS Settings &amp; Info\r 6:Fax Apps &amp; Drivers\r 7\n:Networking\r\r 3: TBN4 Data Management\r\r 1\n:General Business\r 2:Calendars &amp; PIMs\r 3:Database Management\r 4\n:Desktop Presentations\r 5:Finance &amp; Accounting\r 6\n:Integrated Applications\r 7:Project Planners\r 8:Spreads  idea that this might work\r\n in the first place? Did you ever hope (or suspect) that it would catch on so\r\n wildly? Were you really visionaries with a date with destiny, or just a couple\r\n of (old usage of the word) hackers having fun?\r\n\r\n10 responses total.\r\n\r\n\r\n-&gt; 1 Ward Christensen [ward] (3) on Tue Nov 11 22:29:00 1986\r\n Have you seen the Nov '78 BYTE article, that spelled out the beginnings.\r\n I have told it so many times I'm burned out - but I don't think I ever put\r\n it down, such as to where I could upload it here.\r\n\r\n-&gt; 2 Tim Allman [aztinc] (3) on Wed Nov 12 19:10:55 1986\r\n Might not be such a bad idea to tell it one more time - just to get the\r\n recordd straight and to provide an original story not filtered through a\r\n journalist.  \r\n\r\n-&gt; 3 John J. Welch [jjw] (4) on Wed Nov 12 19:34:25 1986\r\n I just thought it would be rather appropriate here, since both Ward and Randy\r\n are available to let people know. Also, I have this image of Ward having a\r\n hard time walking when it rains - he keeps walking *up* the\r\n raindrops...\r\n\r\n-&gt; 4 Ward Christensen [ward] (42) on Thu Nov 13 01:54:01 1986\r\n OK, here's the \"brief\" (read: 1:40 AM on a weekday night) version:\r\n   Randy and I were both 'snowbound' on the 16th of January '78.  I had\r\n the CACHE (Chicago Area Computer Hobbyist's Exchange) \"hotline\" in my\r\n basement.  I was concerned that we weren't getting enough newsletter\r\n material for the club, and thought about the idea of putting a system\r\n on that line for people to call into, and MODEM in articles.  SO, I called\r\n Randy, and he replied:\r\n   (1) \"We'll do it at MY house since I'm in Chicago and it wouldn't be a toll\r\n call to most people;\r\n   (2) \"Just the two of us will do it, becuase if its a club project, it will\r\n take forever and/or never get done.  {Gross paraphrase}\r\n   (3) \"I'll do the hardware, you do the software.  When will it be ready?\"\r\n   So, I started doing the software hacking, and he the hardware hacking.\r\n   Let me back up a bit to say \"why\" it happened: \r\n   (1) \"hobbyist\" modems had come of age - the Hayes internal S-100 modem\r\n   (2) there was a standard hardware bus (S-100) from which you could build\r\n a reasonably economical \"kludge\" system - i.e. so-and-so's memory board,\r\n so-and-so's disk controller (Tarbell Single density, 241K/8\" drive), \r\n such-and-such a serial board (Processor Technology's 3P+S), drives (Innovex\r\n single sided 8\"), video display (\"       \" VDM-1, 64 x 16), and a kludge\r\n keyboard going into the parallel port of the 3P+S.\r\n   (3) there was a standard \"software bus\" - CP/M-80.\r\n   ---\r\n   So, I cranked out about 3 pages of MBASIC code that would \"vaguely simulate\"\r\n the CBBS system, i.e. accept your name, display a message, etc (all from\r\n faked-up msgs in memory).\r\n   As Randy got the hardware together, I cranked out the 8080 assembler for\r\n the software.  Hardware/software wise, it eventually (to date) grew to a\r\n hard disk based S-100 box with 2400 baud modem, and about 20,000 lines of\r\n 8080 assembler.\r\n   That's really it in a nutshell - we don't think anyone else had come up\r\n with a system anything like it before - and certainly no one had the \r\n longevity we did - (thanks, Randy).  We are now looking to have it 'survive'\r\n by being moved to a PC.  I have \"just barely\" gotten it runnin on a PC with\r\n a V-80 8080 emulator chip, but am not happy with the function, etc - the\r\n hassles of not really having the modem and console parallel I/O like I did\r\n for the CP/M machine.  Don't know what is best.  For example, can't drop out\r\n of CBBS into PC-DOS and run remotely - it just isn't there.  I need to perhaps\r\n hack up a character device driver which will parallel the modem with the\r\n local output, to make remote operation of it more practical.  \r\n   Well, that wasn't as brief as I had expected, . . any questions?\r\n \r\n\r\n-&gt; 5 Art Clemons [ac] (5) on Thu Nov 13 10:06:48 1986\r\n You have a way of making years of labor, frustration, caller idiocy and expense\r\n so short and simple that anyone could have done it.  Show some more pride, you\r\n did something that no one else had done as cheaply or efficiently and inspired\r\n enough imitators to fill a small town phone book as well as at least 20 large\r\n for pay imitators like Compuserve etc.\r\n\r\n-&gt; 6 Ward Christensen [ward] (5) on Fri Nov 14 23:23:49 1986\r\n Right, \"anyone could have done it\".  I feel even more strongly that way about\r\n XMODEM - It was no big deal, I just happened to be first.  It wasn't great,\r\n or even very good - but it was first.\r\n   Yes, the \"user frustrations\" were significant.\r\n \r\n\r\n-&gt; 7 Bill Wisner [bdw] (2) on Sun Nov 23 19:27:33 1986\r\n CompuServe came before CBBS.. as a business-type system. It didn't get into\r\n consumer territory until after CBBS came along.\r\n\r\n-&gt; 8 Randy Suess [randy] (2) on Mon Nov 24 09:18:59 1986\r\n Don't believe so.  I seem to recall Cser{_ve being discussed long\r\n after CBBS&gt;\r\n\r\n-&gt; 9 Bill Wisner [bdw] (1) on Mon Nov 24 17:21:34 1986\r\n No; it was around.. but not nearly so big. And much more primitive.\r\n\r\n-&gt; 10 Art Clemons [ac] (3) on Mon Nov 24 23:20:30 1986\r\n You mean when I lived in Columbus OH, the employees of compserve lied to me!\r\n I'm shocked, I thought they only lied about how hard it was to steal a pass-\r\n word!\r\n\r\nRespond or pass? \r\n\r\nOk: r 32\r\n\r\n --\r\nItem 32: History: Me, Micros, Randy, Xmodem, CBBS (LONG)\r\n by Ward Christensen [ward] at Sat, Mar 18, 1989 (00:38) {163 24}\r\n\r\n \r\n Overly-long item of my personal history, meeting Randy, the history of the\r\n XMODEM file transfer protocol, CBBS, and the reason you unscrew Oreo\r\n cookies.\r\n \r\n\n    [... 截后 190 行 ...]"}, {"cat": "B", "title": "MicroSellar BBS · \"Thank Your SysOp\" 公告", "sysop": "Kris Lewis", "year": "1985-87", "body": "  The following is a portion of a bulletin captured on MicroSellar BBS. Please\r\nread it carefully and react accordingly! These guys &amp; gals are letting us use\r\ntheir computers, their time, and their money so we can possibly get some \r\nenjoyment out of it. Unfortunately, many users are abusing the priviledge (and\r\ntherefore the SysOps...)! Don't be an abuser! If you have nothing to upload \r\nthat the particular BBS you are on-line to at the moment doesn't already have,\r\nleave a note to the SysOp and thank him or her for the use of the system, look \r\nthrough the messages (maybe someone asked a question that YOU know the answer \r\nto!!), and most importantly, REMEMBER that there is a REAL PERSON at the other \r\nend of the line. I, for one, enjoy and appreciate this service (YES, I said \r\n\"SERVICE!!\") that these people are providing us for free, or next to nothing. \r\nThe most I've been asked to pay for the use of a given board is $25. That says \r\nsomething for the people operating the BBS's: They are interested in people. \r\nThose that ask payment are usually running large boards that they cannot \r\nafford to pay for completely out of their own pockets. Don't get the idea that \r\nyou and I and the other users are \"letting him freeload\", as I saw in a bitter \r\nmessage from one user somewhere... WE are the \"freeloaders\" whether we pay for \r\nthe service or not! Even those that charge are paying a sizable chunk of the \r\noperating costs out of their own pockets. We should all know this and \r\nappreciate it. Just a quick note (selecting \"C\"omment on most boards is a \r\nquick and painless way to do so) to the SysOp saying \"Thanks!\" is a lot more \r\nthan they are getting from a lot of people...\r\n  I am not a SysOp. I am just a user who sees a lot of this abuse, though I \r\nhadn't realized its extent till I saw this bulletin. Read it, please, and take \r\nnote: Thank a SysOp. He (or She) is a real person and deserves to be treated \r\nas one...   Thank You\r\n\r\nKris Lewis  (I can be reached fairly easily on The Crest, Fargo, AirComm, The \r\n             2nd Ring, and Low Overhead, all of whose numbers are at the end\r\n             of this text.)\r\n\r\n\r\n------------------------------------------------------------------------------\r\n\r\n\r\n          Whatever happened to the COMMUNICATIONS in telecommunications?\r\n     Is this the result of the Computer Age, that people don't talk or\r\n     communicate with each other?  Are we getting so totally in tune with\r\n     our equipment that we're excluding PEOPLE?  If so, then Orwell's pre-\r\n     dictions are tame in comparison with the reality.  Who took the\r\n     BULLETIN BOARD out of Bulletin Board System?  The file transfer sect-\r\n     ion of my board is shiny from daily use, but the bulletin section is\r\n     obscured by cobwebs.  The thought has crossed my mind more than once\r\n     just to load up a host program and let people grab whatever programs\r\n     look interesting.\r\n\r\n          \"Do you have a logon code for this system (Y/N) ==&gt; Y &lt;==\"\r\n          \"What is your account number? 775\"\r\n          \"What is your logon code? PASSWORD\"\r\n          \"INVALID LOGON CODE\"\r\n          \"Do you have a logon code for this system (Y/N) ==&gt; Y &lt;==\"\r\n          \"What is your account number? 305\"\r\n          \"What is your logon code? PASSWORD\"\r\n\r\n          et cetera, ad infinitum et ad nauseam.\r\n\r\n     Hackers.  Or so they'd like to believe.  Vandals, pests, yes.  Hackers?\r\n     They should be so talented, devoted and lucky.  Why do these computer-\r\n     ized delinquents find such delight in trying to break into bulletin\r\n     boards?  Don't they realize that sysops are ordinary people just like\r\n     themselves trying to find a little enjoyment in their hobby?  Why pick\r\n     on me?  I'm spending a lot of time and money trying to provide people\r\n     a service for free, and they want to go and spoil it for everyone.\r\n     Heck, if they want onto the system, all they have to do is apply for a\r\n     logon.  Why make life difficult for everyone?  Leave me alone.  Go pick\r\n     on CompuServe.\r\n\r\n     Caller logs on.  Leaves E-Mail to a friend.  Lines only fill half the\r\n     screen, so he's probably using a Commodore 64. Goes to file transfer\r\n     section, and selects UltraTerm protocol.  Chooses a file that indicates\r\n     it's a TRS-80 program.  BBS goes to send, he figures out that he's\r\n     somewhere he doesn't want to be and drops carrier.\r\n\r\n     Another caller logs on four times in a row, but keeps losing carrier\r\n     before he can do anything.  Probably phreaking on a cheapie phone ser-\r\n     vice.\r\n\r\n     Another caller successfully downloads a file.  Sit.  Wait.  Wait some\r\n     more.  System eventually times out and drops him.\r\n\r\n          I'm not the most polite person in the world and I'm certainly not\r\n     one to stand on ceremony, but I am old enough to remember what manners\r\n     were.  They also went down the tubes with \"communications\" and \"bulle-\r\n     tin boards.\"  Whoops!  Dropped carrier!  So what?  If it's a halfway\r\n     decent system, it'll reboot.  Well, I'll just go to bed while download-\r\n     ing this long file, the system will eventually throw me off and reboot.\r\n     Never mind that there's other people wanting to call into the board.\r\n     Who cares that the sysop climbs the walls when he sees someone drop\r\n     carrier or time-out on the system?  Lately I've gotten into the habit\r\n     of dropping carrier ON MY END for the worst offenders.  One good hang-\r\n     up deserves another.\r\n\r\n          Along with all the other goodies that have bitten the dust, there's\r\n     good old APPRECIATION.  As I mentioned before, my BBS has fielded over\r\n     12,000 calls.  Out of all of them, I have gotten maybe a dozen messages\r\n     saying \"Thanks for running your BBS.\"  That's about one \"Thank You\" per\r\n     THOUSAND calls!  Unfortunately, it seems that people think they have all\r\n     this automatically coming to them.  It's their right!  Sorry to disil-\r\n     lusion anyone, but that just ain't so.  The master switch for this sys-\r\n     tem is two feet away, and I'm not so decrepit that I can't hit it in a\r\n     flash.  Alternatively, I can ban anyone I wish from my system.  Callers\r\n     use this BBS at my forbearance only, and it's not a God-given right.\r\n     It's a sysop-given privilege!  I sincerely feel that we should proclaim\r\n     a \"Sysop Appreciation Day.\"  We certainly don't get any on a day-to-day\r\n     basis!\r\n\r\n          Don't get me wrong.  There ARE joys and benefits in running a BBS,\r\n     although sometimes in my nether moods I'm hard pressed to enumerate\r\n     them.  But the fact is, there have been many occasions when I've rest-\r\n     ed my finger on the switch with the idea of going offline forever.\r\n\r\n          Now for the moral of the story.  I'm only one sysop among many,\r\n     and I'm not trying to evoke sympathy for myself through this article.\r\n     The point is that almost every sysop around has these feelings to some\r\n     extent or another.  And further, most of these sysops (especially the\r\n     best and most devoted ones) are going to reach a saturation point and\r\n     wind up depriving the general public of their services.  I foresee a\r\n     day coming, and very soon at that, when the high quality BBS's will be\r\n     all gone.  So all this is really a plea for everyone to shape up their\r\n     acts before it's too late.  If nothing else, when you're on a bulletin\r\n\n    [... 截后 124 行 ...]"}, {"cat": "D", "title": "Iago's War Manual · TradeWars 2002 玩家手册", "sysop": "Jim Bianchi · Eclectic Garbanzo BBS (707)539-1279", "year": "1989", "body": "\r\n──╥──                        ╥  ╥  ┬            ╓──╥──┐ \r\n  ║   ╓──┐ ╓──┐ ╓──┐ ╖ ╓─┐   ║  ║  │ ╓──┐ ╥──┐  ║  ║  │ ╓──┐ ╓──┐ ╥  ┬ ╓──┐ ╥\r\n  ║   ╟──┤ ║ ─┐ ║  │   ╙─┐   ║  ║  │ ╟──┤ ╟─┬┘  ║  ║  │ ╟──┤ ║  │ ║  │ ╟──┤ ║   \r\n──╨── ╨  ┴ ╙──┘ ╙──┘  ╙──┘   ╙──╨──┘ ╨  ┴ ╨ ┴   ╨  ╨  ┴ ╨  ┴ ╨  ┴ ╙──┘ ╨  ┴ ╨──┘\r\n                                                             v1.1\r\n\r\n                              ╥──┐ ╓──┐ ╥──┐\r\n                              ╟─   ║  │ ╟─┬┘\r\n                              ╨    ╙──┘ ╨ ┴\r\n\r\n  ╓──╥──┐                     ╥  ╥  ┬ \r\n     ║    ╥──┐ ╓──┐ ╥──┐ ╥──┐ ║  ║  │ ╓──┐ ╥──┐  ╓─┐   ───┐ ╓──┐ ╓──┐ ───┐\r\n     ║    ╟─┬┘ ╟──┤ ║  │ ╟─   ║  ║  │ ╟──┤ ╟─┬┘  ╙─┐   ╓──┘ ║  │ ║  │ ╓──┘\r\n     ╨    ╨ ┴  ╨  ┴ ╨──┘ ╨──┘ ╙──╨──┘ ╨  ┴ ╨ ┴  ╙──┘   ╙─── ╙──┘ ╙──┘ ╙───\r\n                                                      v1.03 and v1.03d only..\r\n\r\n\r\n                \"The winds of Hell, have a sulphur smell,\"\r\n                     Reads a card from the late Iago.\r\n                \"And the brownish haze, on the warmer days,\r\n                     \"Reminds me of Chicago..\"\r\n\r\n                                                  -Jim Bianchi (Iago)\r\n                                               sysop, Eclectic Garbanzo BBS\r\n                                                       (707) 539-1279\r\n\r\n                               o    o    o\r\n\r\n\r\n\r\n     I'd like to acknowledge (among others) Joel Downer, Albin Gersich,\r\nFred Polli, Dan Roseen, Leonard Adolph, Steve Genardini, Stephen Whitis, \r\nJohn Warfin, Dave Myers, Woody Weaver, Jim Pittman, Matt Bush, Eugene Hung, \r\nKris Lewis, David White, Nancy Durbin, Jason Boyd, Carol Barela, Carolyn \r\nStoffel, Mark Cothram, Ed Kammerer, Mike Magero, Pierre Tourigny and, of \r\ncourse, Gary and Mary Ann Martin, the author(s) of TradeWars 2002. I'd like \r\nto thank you one and all for providing much of the mat'l for this file and \r\nfor helping to make TradeWars a most entertaining diversion. \r\n\r\n     This file is an updated version of the original Iago's War Manual and \r\nshould replace it. Much of what follows was obtained from the files TWTIPS12,\r\nTWINFO, and from monitoring the FIDO and RIME TradeWars conferences. And from\r\nplaying the game itself. \r\n\r\n───────────────────────────────────────────────────────────────────────────\r\nCONTENTS:\r\n\r\n  History of the game         Bugs in the game       Ferrengi\r\n  Frequently asked questions  Planet cloning bug     Tips 'n tricks\r\n  Align and xp changes        On the use of bugs     Reference section\r\n  Keeping an evil ISS         Mapping the universe   Macro pgms (\"scripts\")\r\n  Suggested tactics           Attacks/invasions      The 5xp sell/steal cycle\r\n  Ship selection              Colonists              Afterword             \r\n───────────────────────────────────────────────────────────────────────────\r\n\r\n\r\n[ History of the game ] ███████████████████████████████████████████████████\r\n\r\n     The current final release of TradeWars 2002 is v1.03d. Many sites are \r\nstill running v1.03; this older version has many ..ah, bugs, in it that are \r\nconsidered to be extremely destructive to game play, most notably the inf- \r\namous planet cloning and multiple colonist jettisoning bugs. v1.03d fixed \r\nboth of these in the course of improving the DESQview timeslicing. The new \r\nv1.03d mods are supplied as an archive containing only the four executable \r\nfiles: TEDIT.EXE and TEDIT.OVL and TW2002.EXE and TW2002.OVL. Since there \r\nis no player data stored in these files, they can be installed (dropped in) \r\nover a running game with no loss of player assets or points.\r\n---\r\n\r\n- by Carol Barela:\r\n\r\nFirst I would like to give you a brief history of the Trade Wars games.\r\nThis will help you and others understand where the game has been and where \r\nit is going.\r\n\r\nTrade Wars first came into being as a programming assignment for the Unix \r\nsystem. (Authors unknown.) Much like the great old DND game Moria first \r\ncame about.\r\n\r\nThen it was ported over to the IBM world and Chris Sherrick and Alan\r\nDavenport had a go at the game and we had TW 500 and TW 1000 (there may be \r\na few other numbers in here...memory fails me at times). These games were \r\nthe jewels of BBS door games. Everybody played them.\r\n\r\nBTW, the style of play in all of these games remains pretty much the same,\r\nthe look, feel and playability. This very echo used to be filled with\r\ninformation on these early games.\r\n\r\nThen for some reason Chris and Alan parted ways. Chris teamed up with\r\nJohn Morris and they have gone on to TW 1114 (I think is the last version\r\nnumber). They have many features new to the game, multi-node play, etc.\r\nBut the game still retains the TW look. Alan Davenport came up with\r\nYankee Trader.\r\n\r\nThat game was also in the TW tradition and also had the same playability.\r\nOnly this time instead of battling the evil Cabal, you had the Xannor after\r\nyou. Alan's game was a big hit, and still is in many parts of the country.\r\nHe is still upgrading and improving the game and his latest version is\r\nYT35.\r\n\r\nAlan's game Yankee Trader soon took over this [FIDO] echo. It reigned \r\nsurpreme for a long time. Until Gary Martin's version, TW2002, hit the \r\nBBS's. This game too, had some improvements and captured the fancy of all \r\nthe TW and YT players that it soon took over this echo. But like all the \r\nothers before it, it had the same look, feel and playability of the orig- \r\ninal Trade Wars game. His evil alien race were the Ferrengi. He added \r\nplanet defenses and a different way of moving planets, and some nice ship \r\ntypes. All in all a nice improvement upon the game. Now this game holds the \r\nattention of the echo.\r\n\r\nSo to answer your question, all of the above are the REAL Trade Wars. None \r\nof them are clones, just natural progressions of one of the finest space/ \r\nwar trading strategy games. The credit for concieving this great game goes \r\nto some anonymous programmers who are more than likely stockbrokers some- \r\nwhere with no time or thought to what they started. Everyone else has made \r\nimprovements. Even Gary Martin, who DID NOT CREATE THIS GAME, only improved \r\nupon the original concept. The game you are asking about is TW2002, and the \r\nlatest version of it is v1.03d.\r\n\r\n\n    [... 截后 198 行 ...]"}];

const STORE = 'noclip-bbs-v1';
let onlineStart = 0;
let currentItemIdx = -1;
let userHandle = 'GUEST';

// ============================================================
// 拨号 → 登录 → 主菜单 流程
// ============================================================
const screen = document.getElementById('screen');
const prompt = document.getElementById('prompt');
const promptText = document.getElementById('prompt-text');
const promptInput = document.getElementById('prompt-input');
const viewer = document.getElementById('viewer');

function append(text, cls='') {
  if (cls) screen.innerHTML += `<span class="${cls}">${text}</span>`;
  else screen.innerHTML += text;
}

function appendLine(text='', cls='') {
  append(text + '\n', cls);
  window.scrollTo(0, document.body.scrollHeight);
}

async function typeLine(text, cls='', delay=18) {
  const start = screen.innerHTML.length;
  if (cls) screen.innerHTML += `<span class="${cls}"></span>`;
  const span = cls ? screen.lastChild : screen;
  for (const c of text) {
    span.textContent += c;
    await sleep(delay + Math.random() * 8);
  }
  screen.innerHTML += '\n';
  window.scrollTo(0, document.body.scrollHeight);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function showPrompt(text, cb) {
  promptText.textContent = text;
  promptInput.value = '';
  prompt.style.display = 'flex';
  promptInput.focus();
  promptInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const v = promptInput.value.trim();
      prompt.style.display = 'none';
      cb(v);
    }
  };
}

// 拨号声合成
function playModemSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    // 拨号 tones (DTMF-like): 1-800-WORKS-BBS  · 简化成 7 个 tone
    [697, 1209, 770, 1336, 852, 1477, 941].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.05, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.15);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + i * 0.18); osc.stop(now + i * 0.18 + 0.15);
    });
    // 然后 ring (1 声铃)
    [440, 480].forEach(freq => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.025, now + 1.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2.3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + 1.5); osc.stop(now + 2.3);
    });
    // carrier handshake (2 短 + noise)
    [2100, 2225].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'square'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.03, now + 2.6 + i*0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2.6 + i*0.4 + 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + 2.6 + i*0.4); osc.stop(now + 2.6 + i*0.4 + 0.5);
    });
    // 静电噪音 (handshake)
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
    const ch = noiseBuf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * 0.1;
    const noise = ctx.createBufferSource(); noise.buffer = noiseBuf;
    const ngain = ctx.createGain();
    ngain.gain.setValueAtTime(0.04, now + 3.0);
    ngain.gain.exponentialRampToValueAtTime(0.001, now + 4.5);
    noise.connect(ngain); ngain.connect(ctx.destination);
    noise.start(now + 3.0); noise.stop(now + 4.5);
  } catch (e) {}
}

async function dial() {
  document.getElementById('status-station').textContent = '~ dialing ~';
  await typeLine('ATDT 1-800-WORKS-BBS', 'yel', 30);
  await sleep(400);
  playModemSound();
  await typeLine('Dialing...', 'dim', 50);
  await sleep(1500);
  await typeLine('RING...', 'dim', 50);
  await sleep(800);
  await typeLine('CONNECT 14400/V.42bis/MNP5', 'br', 20);
  await sleep(400);
  document.getElementById('carrier').textContent = 'CARRIER';
  document.getElementById('carrier').classList.add('lit');
  document.getElementById('status-station').textContent = '~ THE WORKS BBS ~';
  onlineStart = Date.now();
  setInterval(updateOnlineTime, 1000);
  await sleep(400);
  await showWelcome();
}

function updateOnlineTime() {
  const sec = Math.floor((Date.now() - onlineStart) / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById('online-time').textContent =
    `${m}:${String(s).padStart(2, '0')} online`;
}

async function showWelcome() {
  appendLine('');
  appendLine('┌─────────────────────────────────────────┐', 'br');
  appendLine('│                                         │', 'br');
  appendLine('│   ' + '<span class="yel">T H E   W O R K S   B B S</span>'.padEnd(48 + 33) + '│', 'br');
  appendLine('│                                         │', 'br');
  appendLine('│   <span class="dim">Established 1988 · Boston, MA</span>          │', 'br');
  appendLine('│   <span class="dim">SysOp: Jason Scott</span>                     │', 'br');
  appendLine('│   <span class="dim">3 lines · 14400 baud · 24/7</span>            │', 'br');
  appendLine('│                                         │', 'br');
  appendLine('│   <span class="mag">"where art meets phreaks"</span>              │', 'br');
  appendLine('│                                         │', 'br');
  appendLine('└─────────────────────────────────────────┘', 'br');
  appendLine('');
  await sleep(400);
  appendLine('Press RETURN to continue _', 'yel');
  await waitForReturn();
  await loginPrompt();
}

function waitForReturn() {
  return new Promise(resolve => {
    const handler = (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        window.removeEventListener('keydown', handler);
        resolve();
      }
    };
    window.addEventListener('keydown', handler);
  });
}

async function loginPrompt() {
  appendLine('');
  await new Promise(resolve => {
    showPrompt('LOGIN:', (v) => {
      userHandle = (v || 'guest').toUpperCase().slice(0, 14);
      resolve();
    });
  });
  appendLine('');
  await typeLine(`Welcome, ${userHandle}.`, 'br', 18);
  await sleep(200);
  await typeLine(`Last login: 1991-03-14 03:47 by SLAYER`, 'dim', 18);
  await typeLine(`You have 0 new messages.`, 'dim', 18);
  await typeLine(`30 minutes remaining on your account.`, 'dim', 18);
  await sleep(400);
  await mainMenu();
}

async function mainMenu() {
  viewer.style.display = 'none';
  appendLine('');
  appendLine('═══════════════ <span class="yel">M A I N   M E N U</span> ═══════════════', 'br');
  appendLine('');
  appendLine('   <span class="yel">(M)</span> Messages     · 留言板 / 论战');
  appendLine('   <span class="yel">(F)</span> Files        · 文件区');
  appendLine('   <span class="yel">(D)</span> Doors        · BBS 小游戏');
  appendLine('   <span class="yel">(B)</span> Bulletins    · 通告 · 公告');
  appendLine('   <span class="yel">(A)</span> ANSI Art     · 艺术包');
  appendLine('   <span class="yel">(G)</span> Goodbye      · 挂线');
  appendLine('');
  appendLine('═══════════════════════════════════════════', 'br');
  appendLine('');
  showPrompt('Command [M/F/D/B/A/G]:', (cmd) => {
    handleMenuCmd(cmd.toUpperCase());
  });
}

function handleMenuCmd(cmd) {
  if (cmd === 'G' || cmd === 'GOODBYE') {
    hangup();
    return;
  }
  const cats = { 'M': 'M', 'F': 'F', 'D': 'D', 'B': 'B', 'A': 'A' };
  if (!cats[cmd]) {
    appendLine('Unknown command. Try again.', 'red');
    mainMenu();
    return;
  }
  showCategory(cats[cmd]);
}

function showCategory(cat) {
  const list = ITEMS.filter(i => i.cat === cat);
  const labels = { M: 'MESSAGES', F: 'FILES', D: 'DOORS', B: 'BULLETINS', A: 'ANSI ART' };
  appendLine('');
  appendLine(`▼ ${labels[cat]} ▼`, 'yel');
  appendLine('');
  if (list.length === 0) {
    appendLine('  [ no items in this area · loading ... ]', 'dim');
    appendLine('');
    mainMenu();
    return;
  }
  list.forEach((it, i) => {
    const globalIdx = ITEMS.indexOf(it);
    appendLine(`   <span class="yel">[${i+1}]</span> ${escHtml(it.title)} <span class="dim">· ${it.year} · ${it.sysop}</span>`);
  });
  appendLine('');
  showPrompt(`Pick [1-${list.length}] or (M)enu:`, (c) => {
    const n = parseInt(c, 10);
    if (n >= 1 && n <= list.length) {
      const globalIdx = ITEMS.indexOf(list[n-1]);
      openItem(globalIdx);
    } else if (c.toUpperCase() === 'M') {
      mainMenu();
    } else {
      mainMenu();
    }
  });
}

function openItem(idx) {
  const it = ITEMS[idx];
  currentItemIdx = idx;
  document.getElementById('viewer-head').innerHTML =
    `▸ <span class="yel">${escHtml(it.title)}</span> · <span class="dim">${it.year} · ${escHtml(it.sysop)}</span>`;
  document.getElementById('viewer-body').innerHTML = renderBody(it.body);
  viewer.style.display = 'block';
  viewer.scrollIntoView({ behavior: 'smooth' });
}

function renderBody(body) {
  // body 已预渲染 (ans=HTML/txt=已转义), 直出
  return body;
}

function prevItem() {
  const i = (currentItemIdx - 1 + ITEMS.length) % ITEMS.length;
  openItem(i);
}
function nextItem() {
  const i = (currentItemIdx + 1) % ITEMS.length;
  openItem(i);
}
function menuMain() {
  viewer.style.display = 'none';
  mainMenu();
}

async function hangup() {
  appendLine('');
  await typeLine('Thanks for visiting THE WORKS BBS.', 'br');
  await typeLine('NO CARRIER', 'dim');
  document.getElementById('carrier').textContent = 'NO CARRIER';
  document.getElementById('carrier').classList.remove('lit');
  await sleep(500);
  exitRoom();
}

function escHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'bbs-dialup' }, '*');
  } else {
    if (confirm('Hang up modem & leave?')) window.close();
  }
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitRoom();
});

// 启动
setTimeout(dial, 300);
