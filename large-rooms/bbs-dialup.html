n\n    [... 截后 57 行 ...]"}, {"cat": "B", "title": "Engineering BBS Directory", "sysop": "Art Petrzelka · 1991-04 维护", "year": "1991", "body": "                   PUT YOUR BBS HEADER HERE !!!!\r\n\r\n-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-\r\n    Engineering Oriented Bulletin Board Systems Directory\r\n-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-\r\n                 Last Update: March 2, 1991\r\n                 This Update: April 8, 1991\r\n\r\nIf you know of a bulletin board system that is strong on engineering\r\nor scientific subjects, please leave a comment to Art Petrzelka\r\n(SYSOP) on The Computer Plumber BBS at 319-337-6723.\r\n\r\n-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-*-\r\n\r\nBBS entries below marked with an asterisk (*) do not yet have a\r\ndescription included with the full directory.\r\nUnless otherwise noted, all entries operate 24 hours a day, and can\r\nbe accessed at 8 data bits, 1 stop bit, no parity (8N1) at full\r\nduplex. All systems listed have been verified by Art Petrzelka.\r\n\r\n---------------------------------------------------------------\r\n\r\n                        QUICK DIRECTORY\r\n                   Engineering-Related BBS's\r\n\r\nSponsored by Technical Societies:\r\n      AEG FORUM (GO AEG) The Business BBS      213-477-0408\r\n*     ISA Computec BBS                         205-995-6590\r\n      MechEng (was CIME-ISE)                   608-233-3378\r\n      NSPE PEPP BBS                            703-684-2871\r\n      SCIQ                                     313-769-4488\r\n\r\nSponsored by Individuals or Companies\r\n  Primarily Engineering-Related:\r\n      The Biomedical Engineering BBS           201-596-5679\r\n      BOSTON GAS BBS                           617-235-6303\r\n*     The Computer Center BBS                  707-746-0827\r\n      The Computer Plumber                     319-337-6723\r\n      Comtech BBS                              619-689-1865\r\n*     Data Bank                                206-868-6434\r\n      The Data Cache                           414-543-9060\r\n      The Depot                                717-853-3599\r\n      Digital X-Connect BBS                    214-517-8443\r\n      EBBS (Engineering Bulletin Board System) 805-253-2917\r\n      Energy Management Systems                913-842-6110\r\n      Energy Services BBS                      904-772-1537\r\n      The Engineers' Club                      408-265-3353\r\n      EVI Titusville                           407-268-1949\r\n*     The Eyeballer                            702-647-9266\r\n      The Interocitor                          214-258-1832\r\n      MatChat                                  415-655-1753\r\n      M&amp;C Magazine BBS                         813-377-7032\r\n      Megalon BBS                              713-479-3323\r\n      Milwaukee HP48SX BBS                     414-362-2020\r\n      The MOG-UR'S EMS                         818-366-1238/8929\r\n*     New-Con (Concrete)                       301-687-9417\r\n      PPC BBS                                  213-978-0024\r\n      The Preservation-BBS                     618-549-8448\r\n      QU-AN-TO                                 415-255-2981\r\n      SCIence FACTor BBS                       206-562-7083\r\n      The Science Lab                          301-466-0949\r\n      SciQuest                                 414-353-1576\r\n*     Scooters Scientific Exchange             215-657-5586\r\n      Tangent Engineering BBS                  206-778-5360\r\n*     The Tech BBS                             414-233-4506\r\n\r\n\r\nComputer information services which have an engineering section:\r\n      AEC-ONLINE                               818-360-7022\r\n      Alacrity BBS (ACAD)                      206-643-5477\r\n      Comp-U-Ease                              408-286-8332\r\n      Santee Micro BBS                         619-562-8735\r\n      \"YA! WEBECAD!\"                           812-428-3870\r\n*     BIX Engineering conference\r\n*     Compuserve IBMAPP Forum, Section 13, Engineering/Technical/Scientific\r\n*     Compuserve EETNET\r\n*     Intelec Network Engineering Conference\r\n*     InterLink Network Science Conference\r\n*     Relaynet Engineering Conference\r\n\r\nSponsored by Public Bodies\r\n      Applied Modeling Research                919-541-1325\r\n*     California Division of Mines &amp; Geology   916-327-1208\r\n      CEAM BBS                                 404-546-3402\r\n*     COGSNet BBS                              303-740-9493\r\n      EPA ORD BBS                              513-569-7610\r\n      Federal Emergency Management (FEMA) BBS  202-646-2887\r\n      HMIX BBS (Hazmat)                        708-972-3275\r\n      NIU CEET BBS                             815-753-2308\r\n*     U. of Minnesota Engineering BBS          612-625-6091\r\n      US Geological Survey                     703-648-4168\r\n      VA-Tech College Engineering BBS          703-231-7498\r\n\r\nManufacturer's &amp; Sales Representatives Support BBS's\r\n\r\n*     Altera PLA/PLD BBS                       408-249-1100\r\n      Byte Craft BBS                           519-888-7626\r\n*     Burr-Brown BBS                           602-741-3978\r\n      The Circuit Cellar BBS                   203-871-1988\r\n      CONUG East Coast BBS                     407-725-8978\r\n      EEsof MICROWAVE CAE SOFTWARE             818-991-8548\r\n      GE Plastics\r\n      Georgia Power Corporation                404-368-5058\r\n*     Heuristics (for owners of OnSpec only)\r\n      HP Calculator BBS                        503-750-4448\r\n*     JDR Microdevices BBS                     408-559-0297\r\n      Leo Technology BBS                       603-432-2517\r\n*     Motorola - Austin                        512-891-3733\r\n*     Notorola - Toronto                       416-497-8989\r\n*     Motorola - San Diego                     619-279-3907\r\n      National Semiconductor                   408-739-1162\r\n      OPTO 22                                  714-892-8375\r\n*     Professional RBBS                        702-356-1048\r\n      Savannah Power BBS                       912-966-3645\r\n      Shilstone Software                       214-361-7925R\r\n      Tees Engineering                         409-727-8388\r\n*     TI's PLD BBS                             214-997-5665\r\n      WCSCNET                                  713-568-6401\r\n\r\nOther Related\r\n\n    [... 截后 31 行 ...]"}, {"cat": "B", "title": "A Sysop's Peeves · SysOp 烦人用户分类", "sysop": "匿名 SysOp · 关于 Owner/Whiner/Drunk 类型", "year": "~1990", "body": "                        A Sysop's Peeves\r\n                        ----------------\r\n\r\n     It takes a special kind of crazy to make an otherwise \r\nnormal-looking human being choose to operate a bulletin board \r\nsystem... very often (s)he's placing valuable equipment at the \r\nmercy of others, and spending valuable time, and not really \r\nminding a bit. A little acknowledgement, the occasional \"thank \r\nyou\", and periodic uploads of fresh public domain software seem \r\nto keep these types happy. However (you knew there had to be a \r\nhowever to this, after reading the title, didn't you?), there are \r\na few things that can... shall we say...  b o t h e r  a system \r\noperator.\r\n\r\n     The bothersome users of a bulletin board fall into some \r\nbroad classes, which are not necessarily mutually exclusive nor \r\nall that well-defined. Some are truly obnoxious, while others can \r\nget the Sysop upset with a third party, the world in general, or \r\nwith... ummm... the Sysop.\r\n\r\n     Let us introduce the first, and most obnoxious, of those \r\nusers capable of having an effect on an operator's blood \r\npressure. We'll call him the \"Owner\", because that's how the \r\ncreature behaves... like he owns the BBS (not likely to endear \r\nhimself to the sap who pays the bills, no?). There are a broad \r\nrange of symptoms displayed by an Owner. First of all, there is \r\ngenerally no respect given to all the other users of the system: \r\nhe'll log on at 7 P.M. and stay there downloading files until the \r\nsystem (or operator) hangs up on him. At other times he'll call \r\nfor a chat with the Sysop: if the Sysop's not there, he'll leave \r\na nasty message complaining about the Sysop's inattentiveness. If \r\nthe Sysop is there, he'll go on at lengths (typing slowly) asking \r\nwhy the files HE wants aren't always there, and why the BBS isn't \r\ntailored to HIS interests and needs. The only thing good about \r\nthis creature is that he will either (1) get bored and suck some \r\nother Sysop's BBS dry, or (2) get the message that he's being a \r\npig.\r\n\r\n     Next in our BBS zoo we have the Bull. Owners tend to be \r\nBulls, too. A Bull behaves like he's in a china shop, crashing \r\nabout, spending tremendous amounts of time discovering the \r\nvariety of error messages the BBS keeps on file. Now, this sort \r\nof behaviour is not really frustrating to a Sysop... unless he's \r\nwaiting to use the BBS himself. What REALLY gets the Sysop is \r\nthat a full-scale Bull will refuse to admit that it might be \r\nfaster to read the Help files, and if he does have a question, \r\nhe'll pose it to the Sysop himself. This Sysop has a standard \r\nresponse: silence. Any question adequately answered in the Help \r\nfiles does not need further attention. Fortunately for Sysops, \r\nmost Bulls are self-curing. They will either discover the Help \r\nfiles or puzzle out the BBS structure by trial and error... and \r\nerror... and error...\r\n\r\n     Then there's the Apologist, who gets the Sysop mad at \r\nhimself. What happens is the Sysop will complain publicly about \r\nsome Owner or Bull on the system, and the Apologist will then \r\nleave a message saying he's sorry for spending so much time \r\ndownloading a file, or that he tried various commands before \r\ngoing for Help. Why is the Sysop mad? Because a valued user has \r\nfelt badly about the Sysop's complaints, while the REAL object of \r\nthe whole mess never read the rotten complaint anyway!\r\n\r\n     Last, and probably Least, is the classic Twit. Twits are \r\nusually lacking in most of the social graces. A Twit usually is \r\nunable to spell nor comprehend \"courtesy\". He'll go right past \r\nthe Sysop's request not to post messages offering to pirate \r\nsoftware, and then post a message offering to pirate software. \r\nRequests for clean language are met with profanity, and when the \r\noffending messages are wiped from the BBS, the Twit will be \r\nabsolutely outraged. Twits tend to run in groups, and will \r\ndescend on a BBS like a horde of locusts. Twits either grow up \r\n(mentally: a low physical age is not a prerequisite for one to be \r\na Twit) or discover a BBS operated by a fellow Twit who tolerates \r\nthem. The \"cracker\" (what the press erroneously terms a \r\n\"hacker\"), who delights in trying to crash remote systems to \r\ncause maximum discomfort and damage, is a true Twit.\r\n\r\n     Thank goodness there is the Decent User. This is the person \r\nwho will upload files someone's looking for, read the messages \r\nand pipe up if he's got something to say, and will feel a twinge \r\nof guilt (needlessly) when he downloads that neat-looking big \r\nfile or can't find anything half-decent to contribute. They may \r\nnot be thanked, but they're the ones responsible for the \r\ncontinued operation of a BBS.\r\n\r\n                         - Bob Maxwell,\r\n                           Sysop (no foolin', huh?), Turbo BBS,\r\n                           Vancouver, B.C.  (604) 738-7811\r\n                           July 21, 1986\r\n\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\r\n\r\n\r\n\r\n\r\nX-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-X\r\n\r\n Another file downloaded from:                               NIRVANAnet(tm)\r\n\r\n &amp; the Temple of the Screaming Electron   Jeff Hunter          510-935-5845\r\n Salted Slug Systems                      Strange              408-454-9368\r\n Burn This Flag                           Zardoz               408-363-9766\r\n realitycheck                             Poindexter Fortran   415-567-7043\r\n Lies Unlimited                           Mick Freen           415-583-4102\r\n Tomorrow's 0rder of Magnitude            Finger_Man           408-961-9315\r\n My Dog Bit Jesus                         Suzanne D'Fault      510-658-8078\r\n\r\n   Specializing in conversations, obscure information, high explosives,\r\n       arcane knowledge, political extremism, diversive sexuality,\r\n       insane speculation, and wild rumours. ALL-TEXT BBS SYSTEMS.\r\n\r\n  Full access for first-time callers.  We don't want to know who you are,\r\n   where you live, or what your phone number is. We are not Big Brother.\r\n\r\n                          \"Raw Data for Raw Nerves\"\r\n\r\nX-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-=-X\r\n"}, {"cat": "D", "title": "DWANGO · DOOM 拨号联机服务", "sysop": "IVS Corp · Houston 713-(DWANGO)", "year": "1994", "body": "DWANGO v2.0 - The DOOM Wide-Area Network Game Organization!\r\nCopyright (C) 1994 IVS Corporation\r\n\r\n\r\nDWANGO is a revolutionary, new way to play games.  It's all about networking\r\nand playing other people all around the world, no matter where they are.\r\nYou can chat with each other, create teams, join teams and jump into any\r\nDOOM, DOOM2 or HERETIC world you want -- either in DeathMatch or in Co-\r\noperative mode.\r\n\r\nThe problem common to networking computer games is that the other people \r\nthat you want to play might not want to play at the exact same time that you \r\ndo.  Or, you might get tired of beating the same old person time after time \r\nbecause you don't know anyone else in your area with the same DOOM problem \r\nthat you have.  With DWANGO, you get DeathMatch-On-Command! Just dial up and \r\nchallenge someone to a match -- even if it's 3:00 in the morning!\r\n\r\nIMPORTANT NOTE: Since DWANGO is a very new service, you need to dial a\r\nlong-distance number to access it.  The area code is 713, which is in\r\nHouston, TX.  If you can't afford the charges (or don't WANT to), please\r\ndon't run DWANGO.  If you're under 18, please get your parent's permission\r\nbefore you start racking up long-distance bills-from-hell.  Otherwise, if\r\nyou're an avid MoDOOMer, you'll appreciate the convenience of DWANGO.\r\nYou will get a half-hour of FREE time on the server, but to continue using\r\nDWANGO, you will need to enter your credit card information in the Billing\r\nsection and incur a $20 start-up fee.  Then you will need to buy time,\r\nwhich you can choose in the Billing section.\r\n\r\nTo get started, it's easy. Just type DWANGO in your DOOM, DOOM2 or HERETIC\r\ndirectory.  Make sure that you run DWANGO from the directory of the game\r\nyou want to play, or DWANGO won't have any idea which game you're using.\r\nThe best way of running DWANGO is to copy all DWANGO-related files into\r\nthe game directory -- there's DWANGO.EXE, DWANGO.STR and DWANGO.TXT. Then,\r\nrun DWANGO from there.\r\n\r\nFirst off, DWANGO needs to know your configuration, so when you first run\r\nDWANGO, the Create Configuration panel will come up.  You need to enter\r\nyour Baud Rate, COM Port, Area Code and Current Modem.  \r\n\r\nFor baud rate, start off with the fastest baud possible first, 38400.  \r\nSelect the COM port to which your modem is connected.  If your phone line \r\nhas call-waiting, you can disable it by selecting the Disable CallWaiting \r\noption.  If your disable code is not the default \"*70\", you can type the \r\ncorrect one for your area.  Next, you need to enter your area code. Finally, \r\nyou need to choose the type of modem you are using.  Press F1 to choose \r\nyour modem from a list of popular modems. Finally, press the F10 key to \r\ntell DWANGO that you're finished configuring.\r\n\r\nNow, DWANGO is ready for you to log in.  But you're not registered as a\r\nNew User yet, so you need to press F1 at the Login panel to create a New\r\nUser account.\r\n\r\nThe Username is your \"handle\" online; it doesn't need to be your real name.\r\nSo, you could call yourself \"killer\" if you think you're really good.  Or, \r\ncall yourself \"babyboy\" if you're new to all this DeathMatch stuff. Press\r\nENTER after editing an item and you will be moved to the next item. If you\r\nneed to go back and edit your information, just use the cursor keys to move\r\nback to the item.  The Password field will be your permanent password, so\r\nchoose something you'll remember easily.  Every time you log in to DWANGO\r\nafter this time, you'll need to enter both your Username and Password to\r\nget into the system.  Press F10 when you've filled all New User Account\r\nfields to log onto DWANGO!\r\n\r\nDWANGO will then Initialize your modem, then Dial DWANGO. When the DWANGO\r\nServer answers, DWANGO will Attempt to connect to the server.  If connection\r\ndoesn't happen within 20 seconds, something is wrong with either your\r\nBaud Rate or your modem init string.  First, try to change your baud rate\r\nby re-running DWANGO with \"-config\".  The -config parameter will let you\r\nre-enter your Configuration Information and create a new DWANGO.CFG file.\r\n\r\nWhen you finally connect to the DWANGO Server, the main screen will come\r\nup and all the users online will start entering your userlist at the top of\r\nthe screen.  The information listed for each person is the Name of the\r\nperson (their handle), which team they belong to, which PWAD they are\r\nplaying, what their current status is (Available or Playing), which game\r\nthey want to play (DOOM, DOOM2 or HERETIC), which version of the game\r\nthey're using (you must have matching versions to play on the same team),\r\nand finally their User Type.  If you're new to DWANGO, you will be a newbie.\r\nAfter you've paid your start-up fee of $20, your status will be Normal.\r\n\r\nAny time any users enter DWANGO, leave DWANGO, start a team, play a game,\r\nor anything that could change a user's status, that change will be reflected\r\nin the userlist at the top of the screen.\r\n\r\nAs soon as you login for the first time, the DWANGO Server will look at the\r\ninformation you entered for the New User Account you requested.  The Server\r\nwill inform you if you have been accepted or rejected.  For more information,\r\nyou can call 1-800-2DWANGO, or 1-800-239-2646.  If you are rejected, the\r\nNew User panel will come up again for you to re-enter your information. One\r\nreason you could be rejected is by typing a handle or password with a space\r\ncharacter in it.\r\n\r\nIf you've been accepted, then you're in!  You will begin to see text start\r\nscrolling up the screen from the other users online.  They are talking to\r\neach other -- feel free to join in.  Go ahead and type, \"I'm new here!\" and\r\npress the ENTER key.  Someone will strike up a conversation with you and\r\nmaybe ask you to play. Everything you type on the message line will be sent\r\nto the server when you press ENTER.  This area is called the Lobby.\r\n\r\nIf you want to type a message that only one person can read, type their\r\nname, a space, then your message.  If you wanted to tell \"shadow\" that he\r\nreally needs a beating, you would type \"shadow you really need a beating!\".\r\nWhat shadow would see is,\"&lt;your name&gt; TELLs you: you really need a beating!\".\r\n\r\nIf you log onto the server and you're the only one there, but there's a\r\nteam already playing and you want to join in, you can send a message to a\r\nperson on the team, or to all the people on the team.  Just type the name\r\nof a person on the team, or the team name, a space, then your message. An\r\nexample would be,\"level7 i want to join in!\".  If the team name is \"level7\",\r\neveryone on the team would get the message.  If they decide to let you in,\r\nthen you would see them stop playing their game and start talking to you\r\nin the Lobby.\r\n\r\nIf someone creates a team, you will see a message stating the team\r\ninformation.  If you want to play on that team, press F3 to Join.  This will\r\nbring up a Join Team panel -- use the arrow keys to choose the team you\r\nwant to join.\r\n\r\nIf you want to create a team, press F2 and the Create Team panel will come\r\nup.  The most common default options are listed.  You can choose whether\r\n\n    [... 截后 77 行 ...]"}, {"cat": "D", "title": "BACKDOR1 · Amiga/C64 cheat 集合", "sysop": "INFO Magazine · 14 台 Amiga 排版", "year": "1989-02", "body": "February 20 1989 \r\n \r\n \r\nThis is  BACKDOR1.arc   ... the first in a series of  \r\n\"back doors\" to various games.  The source of this info is \r\nvarious magazines, and I have paraphrased the articles. \r\n \r\nNote that \"back door\" refers NOT to regular game hints on \r\nhow to play better, but to a way to CHEAT, usually put \r\nthere by the programmer, sometimes caused by a bug.  Usually \r\nyou'll be made invincible if it's an arcade-type game, or  \r\nbe able to advance quicker if an adventure game.  \r\n \r\nMost of these \"back door\" and \"side door\" hints are out of \r\na GREAT magazine for the Amiga, C64, and C128:  INFO. \r\nIt's a grass-roots, down to earth magazine - the first \r\nmagazine about personal computers to be be entirely done on \r\npersonal computers.  That's \"Where It's At\".   \r\n \r\nYou owe it to yourself to subscribe to INFO. \r\nWith the exception of most of the ads, everything including \r\ncolor screen shots and photos are digitally created, edited, \r\ncomposed, printed, and color separated as complete assembled \r\npages on 14 Amiga computers running Professional Page (and \r\nmany many other Amiga software products), and output to a \r\nLinotronic L300 typesetting device at 1235 dots per inch! \r\nINFO doesn't cover programming techniques, but in my opinion \r\nit out-shines all the other Commodore mags for news, honest \r\nopinion, game reviews, and reviews of all C= software. \r\n \r\nGeorge Knochel, Lakewood Colorado \r\n \r\n \r\n \r\nALL GAMES:  connect a genlock to the Amiga and leave it on \r\nwhile playing games, and they'll play 25% slower, which \r\nallows you to score high.  \r\n \r\n \r\n \r\nARKANOID \r\n \r\nGet into the back door this way:  boot and run the game as \r\nusual, then select a start screen and begin game.  Press the \r\nspace bar to pause, and type in  DSIMAGIC  (no spaces, and  \r\ndon't press Return).  Press the space bar to unpause. \r\n \r\nNow a yellow Power capsule named  DS  will fall down.  Catch \r\nit.  Now you can get any power capsule you want any time. \r\nPress the first letter of the capsule you want, and it will \r\nfall down for you to catch:  \r\n  Break  Catch  Disruption  Expand  Laser  Player  Slow \r\nCatch some Player capsules first to get extra lives. \r\n \r\nYou can also use two capsules at the same time, like Disrupt \r\nthe ball into three balls, and use Lasers also. \r\n \r\nPressing the  F  key will send you to the Finsl screen where \r\nyou fight DOH, the Dominion Over Hour monster on the cover \r\n of the package.  You'll need lots of lives first. \r\n \r\nSkip over any screen by pressing  Enter  on the keypad, or  \r\nget through the screen fast (with points too) using a Break \r\ncapsule. \r\n \r\n \r\n \r\nARKANOID II \r\n \r\nOn the high score screen, type in the name  DEBBIE S   \r\n(with the space), and you'll have infinite lives.   \r\n \r\n \r\n \r\nBARBARIAN \r\n \r\nBoot and run the game as usual, but at some point after the \r\ngame has started, type in:  04-08-59   ...It will make the \r\nBarbarian character almost invincible, but he can still be \r\nkilled by very high falls, and by the flame-hurling horned \r\ndemon in the dungeon deep, pictured on the cover. \r\n \r\nAfter you type  04-08-59  the screen will turn gray, telling \r\nyou that you're invincible. \r\n \r\nOnce you make it to Necron, you must have a shield.  Face  \r\nNecron when he turns to face you.  When he throws a fireball \r\nat you, press the defense button as it hits your shield. \r\n \r\n \r\n \r\nBARD'S TALE \r\n \r\nHow to hoard millions in gold without trying:  Load your \r\nparty, go to the stats screen for the first player.  Pool \r\nall of the party's gold to the first player, then remove \r\nhim from the party, then load him back in.  Then pool the \r\ngold to another player.  Repeat this for each player. \r\n \r\nThen turn off the computer without saving the game.  Reboot \r\nand ezch player will have gold equal to the TOTAL the party \r\nhad before.  Repeat if you're really greedy ! \r\n \r\n \r\n \r\nBETTER DEAD THAN ALIEN \r\n \r\nIf you are just about to be hit by an alien or a bomb, press \r\nthe ESC key to pause, move your ship out of the way, then \r\npress  N  to resume the action. \r\n \r\nType  CHAMP  on the options screen, then press the  HELP \r\nkey.  You'll be shown a list of cheat keys. \r\n \r\n \r\n \r\nCAPONE \r\n \r\nTo find the \"special bonus\", go to the front of the Post \r\nOffice.  Shoot the ball at the top of the flag pole, and  \r\n\n    [... 截后 212 行 ...]"}, {"cat": "A", "title": "Dragon Ascii Art Official List v1.02", "sysop": "Usenet 用户合编 · 1993-12", "year": "1993", "body": "Date: Mon, 20 Dec 93 14:27:57 MET\nX-Mailer: ELM [version 2.3 PL11]\nStatus: OR\n\nThe Not Quite Complete But Getting There Official List Of Dragon Ascii Art\nVersion 1.02 (my other sig. const screen = document.getElementById('screen');
const prompt = document.getElementById('prompt');
const promptText = document.getElementById('prompt-text');
const promptInput = document.getElementById('prompt-input');
const viewer = document.getElementById('viewer');

function append(text, cls='') {
  if (cls) screen.innerHTML += `<span class="${cls}">${text}</span>`;
  else screen.innerHTML += text;
}

function appendLine(text='', cls='') {
  append(text + '\n', cls);
  window.scrollTo(0, document.body.scrollHeight);
}

async function typeLine(text, cls='', delay=18) {
  const start = screen.innerHTML.length;
  if (cls) screen.innerHTML += `<span class="${cls}"></span>`;
  const span = cls ? screen.lastChild : screen;
  for (const c of text) {
    span.textContent += c;
    await sleep(delay + Math.random() * 8);
  }
  screen.innerHTML += '\n';
  window.scrollTo(0, document.body.scrollHeight);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function showPrompt(text, cb) {
  promptText.textContent = text;
  promptInput.value = '';
  prompt.style.display = 'flex';
  promptInput.focus();
  promptInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const v = promptInput.value.trim();
      prompt.style.display = 'none';
      cb(v);
    }
  };
}

// 拨号声合成
function playModemSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    // 拨号 tones (DTMF-like): 1-800-WORKS-BBS  · 简化成 7 个 tone
    [697, 1209, 770, 1336, 852, 1477, 941].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.05, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.15);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + i * 0.18); osc.stop(now + i * 0.18 + 0.15);
    });
    // 然后 ring (1 声铃)
    [440, 480].forEach(freq => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.025, now + 1.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2.3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + 1.5); osc.stop(now + 2.3);
    });
    // carrier handshake (2 短 + noise)
    [2100, 2225].forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'square'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.03, now + 2.6 + i*0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2.6 + i*0.4 + 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + 2.6 + i*0.4); osc.stop(now + 2.6 + i*0.4 + 0.5);
    });
    // 静电噪音 (handshake)
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
    const ch = noiseBuf.getChannelData(0);
    for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * 0.1;
    const noise = ctx.createBufferSource(); noise.buffer = noiseBuf;
    const ngain = ctx.createGain();
    ngain.gain.setValueAtTime(0.04, now + 3.0);
    ngain.gain.exponentialRampToValueAtTime(0.001, now + 4.5);
    noise.connect(ngain); ngain.connect(ctx.destination);
    noise.start(now + 3.0); noise.stop(now + 4.5);
  } catch (e) {}
}

async function dial() {
  // Sprint 1: 记录访问
  if (window.NOCLIP) window.NOCLIP.logVisit('bbs');
  document.getElementById('status-station').textContent = '~ dialing ~';
  await typeLine('ATDT 1-800-WORKS-BBS', 'yel', 30);
  await sleep(400);
  playModemSound();
  await typeLine('Dialing...', 'dim', 50);
  await sleep(1500);
  await typeLine('RING...', 'dim', 50);
  await sleep(800);
  await typeLine('CONNECT 14400/V.42bis/MNP5', 'br', 20);
  await sleep(400);
  document.getElementById('carrier').textContent = 'CARRIER';
  document.getElementById('carrier').classList.add('lit');
  document.getElementById('status-station').textContent = '~ THE WORKS BBS ~';
  onlineStart = Date.now();
  setInterval(updateOnlineTime, 1000);
  await sleep(400);
  await showWelcome();
}

function updateOnlineTime() {
  const sec = Math.floor((Date.now() - onlineStart) / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById('online-time').textContent =
    `${m}:${String(s).padStart(2, '0')} online`;
}

  appendLine('│                                         │', 'br');
  appendLine('└─────────────────────────────────────────┘', 'br');
  appendLine('');

function waitForReturn() {
  return new Promise(resolve => {
    const handler = (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        window.removeEventListener('keydown', handler);
        resolve();
      }
    };
    window.addEventListener('keydown', handler);
  });
}

async function loginPrompt() {
  appendLine('');
  // Sprint 1: 默认 NOCLIP handle 作 LOGIN (玩家也可以输别的, 但 enter 直接通过用默认)

  await new Promise(resolve => {
    showPrompt(`LOGIN: [${defaultHandle}]`, (v) => {
      userHandle = (v || defaultHandle).toUpperCase().slice(0, 14);
      resolve();
    });

  appendLine('');
  await typeLine(`Welcome, ${userHandle}.`, 'br', 18);
  await sleep(200);
  // Sprint 1: 真"上次登录"
  const visitInfo = window.NOCLIP ? window.NOCLIP.visitInfo('bbs') : { isReturn: false };
  if (visitInfo.isReturn && visitInfo.lastBefore) {
    const ago = window.NOCLIP.timeAgo(visitInfo.lastBefore);
    await typeLine(`Last login: ${ago} by ${userHandle} (you · ${visitInfo.count} total visits)`, 'dim', 18);
  } else {
    await typeLine(`Last login: 1991-03-14 03:47 by SLAYER`, 'dim', 18);
  }
  await typeLine(`You have 0 new messages.`, 'dim', 18);
  await typeLine(`30 minutes remaining on your account.`, 'dim', 18);
  await sleep(400);
  await mainMenu();
}

async function mainMenu() {
  viewer.style.display = 'none';
  appendLine('');
  appendLine('═══════════════ <span class="yel">M A I N   M E N U</span> ═══════════════', 'br');
  appendLine('');
  appendLine('   <span class="yel">(M)</span> Messages     · 留言板 / 论战');
  appendLine('   <span class="yel">(F)</span> Files        · 文件区');
  appendLine('   <span class="yel">(D)</span> Doors        · BBS 小游戏');
  appendLine('   <span class="yel">(B)</span> Bulletins    · 通告 · 公告');
  appendLine('   <span class="yel">(A)</span> ANSI Art     · 艺术包');
  appendLine('   <span class="yel">(G)</span> Goodbye      · 挂线');
  appendLine('');
  appendLine('═══════════════════════════════════════════', 'br');
  appendLine('');
  showPrompt('Command [M/F/D/B/A/G]:', (cmd) => {
    handleMenuCmd(cmd.toUpperCase());
  });
}

function handleMenuCmd(cmd) {
  if (cmd === 'G' || cmd === 'GOODBYE') {
    hangup();
    return;
  }
  const cats = { 'M': 'M', 'F': 'F', 'D': 'D', 'B': 'B', 'A': 'A' };
  if (!cats[cmd]) {
    appendLine('Unknown command. Try again.', 'red');
    mainMenu();
    return;
  }
  showCategory(cats[cmd]);
}

function showCategory(cat) {
  // Sprint 3: 隐藏碎片 — doorCount 不够时过滤
  const dc = (window.NOCLIP && window.NOCLIP.doorCount) || 0;
  const list = ITEMS.filter(i => i.cat === cat && (!i._doorGate || dc >= i._doorGate));
  const labels = { M: 'MESSAGES', F: 'FILES', D: 'DOORS', B: 'BULLETINS', A: 'ANSI ART' };
  appendLine('');
  appendLine(`▼ ${labels[cat]} ▼`, 'yel');
  appendLine('');
  if (list.length === 0) {
    appendLine('  [ no items in this area · loading ... ]', 'dim');
    appendLine('');
    mainMenu();
    return;
  }
  list.forEach((it, i) => {
    const globalIdx = ITEMS.indexOf(it);
    appendLine(`   <span class="yel">[${i+1}]</span> ${escHtml(it.title)} <span class="dim">· ${it.year} · ${it.sysop}</span>`);
  });
  appendLine('');
  showPrompt(`Pick [1-${list.length}] or (M)enu:`, (c) => {
    const n = parseInt(c, 10);
    if (n >= 1 && n <= list.length) {
      const globalIdx = ITEMS.indexOf(list[n-1]);
      openItem(globalIdx);
    } else if (c.toUpperCase() === 'M') {
      mainMenu();
    } else {
      mainMenu();
    }
  });
}

function openItem(idx) {
  const it = ITEMS[idx];
  currentItemIdx = idx;
  document.getElementById('viewer-head').innerHTML =
    `▸ <span class="yel">${escHtml(it.title)}</span> · <span class="dim">${it.year} · ${escHtml(it.sysop)}</span>`;
  document.getElementById('viewer-body').innerHTML = renderBody(it.body);
  viewer.style.display = 'block';
  viewer.scrollIntoView({ behavior: 'smooth' });
}

function renderBody(body) {
  // body 已预渲染 (ans=HTML/txt=已转义), 直出
  return body;
}

function prevItem() {
  const i = (currentItemIdx - 1 + ITEMS.length) % ITEMS.length;
  openItem(i);
}
function nextItem() {
  const i = (currentItemIdx + 1) % ITEMS.length;
  openItem(i);
}
function menuMain() {
  viewer.style.display = 'none';
  mainMenu();
}

async function hangup() {
  appendLine('');
  await typeLine('Thanks for visiting THE WORKS BBS.', 'br');
  await typeLine('NO CARRIER', 'dim');
  document.getElementById('carrier').textContent = 'NO CARRIER';
  document.getElementById('carrier').classList.remove('lit');
  await sleep(500);
  exitRoom();
}

function escHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'bbs-dialup' }, '*');
  } else {
    if (confirm('Hang up modem & leave?')) window.close();
  }
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitRoom();
});

// 启动
setTimeout(dial, 300);
</script>
