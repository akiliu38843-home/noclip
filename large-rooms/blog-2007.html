<!-- ============================================================
     NOCLIP shared narrative helper · Sprint 1
     · handle 持久身份 / 门数 / 时钟 / 余温 / 自见
============================================================ -->
<script>
(function(){
  const LS = window.localStorage;
  // 1. handle: 自动生成持久 4 位 guest_XXXX
  function getHandle() {
    let h = LS.getItem('noclip-handle');
    if (!h) {
      h = 'guest_' + Math.floor(Math.random() * 9000 + 1000);
      LS.setItem('noclip-handle', h);
    }
    return h;
  }
  // 2. 门数: 主 index 写入 noclip-door-count, 房间只读
  function getDoorCount() {
    return parseInt(LS.getItem('noclip-door-count') || '1', 10);
  }
  // 3. session 起始时间 (NOCLIP 共用时钟基)
  function getSessionStart() {
    let s = LS.getItem('noclip-session-start');
    if (!s) {
      // 永远从 03:14 AM 开始 (NOCLIP 时间, 不是真时间)
      s = Date.now().toString();
      LS.setItem('noclip-session-start', s);
    }
    return parseInt(s, 10);
  }
  // 4. 共用时钟: 起始 03:14 AM + 每扇门 +N 分钟 (+ 实际经过时间)
  function getNoclipTime() {
    const sessionMin = (Date.now() - getSessionStart()) / 60000;
    const doorMin = getDoorCount() * 4;  // 每扇门 +4 分钟
    const totalMin = 3 * 60 + 14 + sessionMin + doorMin;
    const h = Math.floor(totalMin / 60) % 24;
    const m = Math.floor(totalMin) % 60;
    return {
      h: h, m: m,
      str: String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'),
      ampm: (h < 12 ? 'AM' : 'PM'),
      ampm_str: ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h < 12 ? 'AM' : 'PM')
    };
  }
  // 5. 余温: 记录访问 + 取上次访问
  function logVisit(roomId) {
    const key = 'noclip-visits-' + roomId;
    const visits = JSON.parse(LS.getItem(key) || '[]');
    visits.push(Date.now());
    if (visits.length > 20) visits.shift();
    LS.setItem(key, JSON.stringify(visits));
  }
  function getVisitInfo(roomId) {
    const visits = JSON.parse(LS.getItem('noclip-visits-' + roomId) || '[]');
    return {
      count: visits.length,
      lastBefore: visits.length > 1 ? visits[visits.length - 2] : null,
      isReturn: visits.length > 1
    };
  }
  function formatTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hr ago';
    return Math.floor(hr / 24) + ' day ago';
  }

  // 暴露到 window
  window.NOCLIP = {
    handle: getHandle(),
    doorCount: getDoorCount(),
    sessionStart: getSessionStart(),
    time: getNoclipTime(),
    logVisit: logVisit,
    visitInfo: getVisitInfo,
    timeAgo: formatTimeAgo,
    // 重计算时钟 (跨长会话)
    refreshTime: function() { this.time = getNoclipTime(); return this.time; }
  };
})();
</script>

  renderPosts();
}

function renderSubs() {
  // 按 feed 分组
  const byFeed = {};
  POSTS.forEach(p => {
    if (!byFeed[p.feed]) byFeed[p.feed] = { favicon: p.favicon, color: p.color, count: 0, unread: 0 };
    byFeed[p.feed].count++;
    if (!read.has(p.url)) byFeed[p.feed].unread++;
  });
  const subs = document.getElementById('subs-pane');
  subs.innerHTML = `
    <div class="group">Subscriptions</div>
    ${Object.entries(byFeed).map(([name, f]) => `
      <div class="feed-item" onclick="filterFeed('${name.replace(/'/g, "\\'")}')">
        <span class="favicon" style="background:${f.color}; color:#fff;">${f.favicon}</span>
        <span>${name}</span>
        ${f.unread > 0 ? `<span class="count">${f.unread}</span>` : ''}
      </div>
    `).join('')}
  `;
}

function renderPosts(filterFeed) {
  const posts = filterFeed ? POSTS.filter(p => p.feed === filterFeed) : POSTS;
  const pane = document.getElementById('posts-pane');
  pane.innerHTML = posts.map((p, i) => {
    const isRead = read.has(p.url);
    return `
      <div class="post-item ${isRead ? 'read' : ''}" onclick="openPost(${POSTS.indexOf(p)})">
        <div class="post-title">${escapeHtml(p.title)}</div>
        <div class="post-meta">
          <span>${p.feed}</span>
          <span>·</span>
          <span>${p.date}</span>
        </div>
      </div>
    `;
  }).join('');
}

function filterFeed(name) {
  document.querySelectorAll('.feed-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderPosts(name);
}

function openPost(idx) {
  currentPost = POSTS[idx];
  read.add(currentPost.url);
  localStorage.setItem(STORE+'-read', JSON.stringify([...read]));
  document.getElementById('title-feed').textContent = currentPost.feed;
  document.querySelectorAll('.post-item').forEach(el => el.classList.remove('active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('active');
  document.getElementById('reader-pane').innerHTML = `
    <div class="reader-header">
      <h2>${escapeHtml(currentPost.title)}</h2>
      <div class="meta">
        by <b>${escapeHtml(currentPost.author)}</b> · ${currentPost.date} ·
        <a href="${currentPost.url}" target="_blank">original</a>
      </div>
    </div>
    <iframe class="reader-iframe" src="${currentPost.url}"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
    </iframe>
  `;
  renderPosts();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'blog-2007' }, '*');
  } else {
    if (confirm('unsubscribe all & quit?')) window.close();
  }
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitRoom();
});

init();
</script>
