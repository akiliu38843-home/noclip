<!-- ============================================================
     NOCLIP shared narrative helper · Sprint 1
     · handle 持久身份 / 门数 / 时钟 / 余温 / 自见
============================================================ -->
<script>
(function(){
  const LS = window.localStorage;
  // 1. handle: 自动生成持久 4 位 guest_XXXX
  function getHandle() {
    let h = LS.getItem('noclip-handle');
    if (!h) {
      h = 'guest_' + Math.floor(Math.random() * 9000 + 1000);
      LS.setItem('noclip-handle', h);
    }
    return h;
  }
  // 2. 门数: 主 index 写入 noclip-door-count, 房间只读
  function getDoorCount() {
    return parseInt(LS.getItem('noclip-door-count') || '1', 10);
  }
  // 3. session 起始时间 (NOCLIP 共用时钟基)
  function getSessionStart() {
    let s = LS.getItem('noclip-session-start');
    if (!s) {
      // 永远从 03:14 AM 开始 (NOCLIP 时间, 不是真时间)
      s = Date.now().toString();
      LS.setItem('noclip-session-start', s);
    }
    return parseInt(s, 10);
  }
  // 4. 共用时钟: 起始 03:14 AM + 每扇门 +N 分钟 (+ 实际经过时间)
  function getNoclipTime() {
    const sessionMin = (Date.now() - getSessionStart()) / 60000;
    const doorMin = getDoorCount() * 4;  // 每扇门 +4 分钟
    const totalMin = 3 * 60 + 14 + sessionMin + doorMin;
    const h = Math.floor(totalMin / 60) % 24;
    const m = Math.floor(totalMin) % 60;
    return {
      h: h, m: m,
      str: String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'),
      ampm: (h < 12 ? 'AM' : 'PM'),
      ampm_str: ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h < 12 ? 'AM' : 'PM')
    };
  }
  // 5. 余温: 记录访问 + 取上次访问
  function logVisit(roomId) {
    const key = 'noclip-visits-' + roomId;
    const visits = JSON.parse(LS.getItem(key) || '[]');
    visits.push(Date.now());
    if (visits.length > 20) visits.shift();
    LS.setItem(key, JSON.stringify(visits));
  }
  function getVisitInfo(roomId) {
    const visits = JSON.parse(LS.getItem('noclip-visits-' + roomId) || '[]');
    return {
      count: visits.length,
      lastBefore: visits.length > 1 ? visits[visits.length - 2] : null,
      isReturn: visits.length > 1
    };
  }
  function formatTimeAgo(ts) {
    const diff = Date.now() - ts;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hr ago';
    return Math.floor(hr / 24) + ' day ago';
  }

  // 暴露到 window
  window.NOCLIP = {
    handle: getHandle(),
    doorCount: getDoorCount(),
    sessionStart: getSessionStart(),
    time: getNoclipTime(),
    logVisit: logVisit,
    visitInfo: getVisitInfo,
    timeAgo: formatTimeAgo,
    // 重计算时钟 (跨长会话)
    refreshTime: function() { this.time = getNoclipTime(); return this.time; }
  };
})();
</script>

function resolvePath(p) {
  if (!p || p === '.') return cwd;
  if (p === '~') return '/home/guest';
  if (p.startsWith('~/')) return '/home/guest/' + p.slice(2);
  if (p.startsWith('/')) return p.replace(/\/+$/, '') || '/';
  // relative
  const parts = cwd.split('/').filter(Boolean);
  p.split('/').forEach(seg => {
    if (seg === '..') parts.pop();
    else if (seg && seg !== '.') parts.push(seg);
  });
  return '/' + parts.join('/');
}

function fsGet(path) {
  return FS[path] || FS[path.replace(/\/+$/, '') || '/'];
}

const COMMANDS = {
  help() {
    return [
      "Available commands:",
      "  ls [path]         list directory",
      "  cd [path]         change directory",
      "  pwd               print working directory",
      "  cat <file>        display file",
      "  finger <user>     show user info + .plan",
      "  who               who's currently logged in",
      "  w                 same as who, more verbose",
      "  whoami            your handle",
      "  last [user]       login history",
      "  date              current date/time",
      "  ps                process list",
      "  mail              read mail",

      "  uname [-a]        system info",
      "  exit · logout · ^D   leave shell",
      "",
      "Hint: try `finger mwilson`, `ls /home`, `cat /var/log/messages`",
    ].join('\n');
  },
  ls(args) {
    const path = resolvePath(args[0] || cwd);
    const node = fsGet(path);
    if (!node) return `ls: ${args[0] || path}: No such file or directory`;
    if (node.type !== 'dir') return path.split('/').pop();
    const children = (node.children || []).sort();
    // 简化: 不显示 . .. 等; .开头条目仅 ls -a 时显示
    const hidden = children.filter(c => c.startsWith('.'));
    const visible = children.filter(c => !c.startsWith('.'));
    if (args[0] === '-a' || args.includes('-a')) {
      return ['.', '..'].concat(hidden, visible).join('  ');
    }
    return visible.join('  ');
  },
  cd(args) {
    const path = resolvePath(args[0] || '/home/guest');
    const node = fsGet(path);
    if (!node) return `cd: ${path}: No such file or directory`;
    if (node.type !== 'dir') return `cd: ${path}: Not a directory`;
    cwd = path;
    return '';
  },

    if (!args[0]) return 'usage: cat <file>';
    const path = resolvePath(args[0]);
    const node = fsGet(path);
    if (!node) return `cat: ${args[0]}: No such file or directory`;
    if (node.type !== 'file') return `cat: ${args[0]}: Is a directory`;

        );
      }
      return lines.join('\n');
    }
    const u = USERS[args[0].toLowerCase()];
    if (!u) return `finger: ${args[0]}: no such user.`;
    const lines = [
      `Login: ${args[0]}                  Name: ${u.real}`,
      `Directory: /home/${args[0]}        Shell: /bin/csh`,
    ];
    if (u.login.includes('not logged')) {
      lines.push(`Never logged in.`, `Last seen: ${u.login.match(/\d+/)?.[0] || 'unknown'} days ago`);
    } else {
      lines.push(`On since ${u.idle.includes(':') ? '(today)' : 'recently'} on ${u.login} from ${u.where}`);
      lines.push(`Idle: ${u.idle}`);
    }
    lines.push(`Plan:`);
    u.plan.forEach(p => lines.push(p));
    return lines.join('\n');
  },
  who() {
    const lines = [];
    for (const [u, info] of Object.entries(USERS)) {
      if (info.login.includes('not logged')) continue;
      lines.push(`${u.padEnd(10)} ${info.login.padEnd(8)} May 12 ${(Math.random()*24).toFixed(0).padStart(2,'0')}:${(Math.random()*60).toFixed(0).padStart(2,'0')}`);
    }
    lines.push(`${HANDLE.padEnd(10)} ttyp4    May 12 03:47`);
    return lines.join('\n');
  },
  w() {
    return [
      ' 3:47am  up 47 days, 13:22,  ' + (Object.keys(USERS).filter(u => !USERS[u].login.includes('not logged')).length + 1) + ' users,  load average: 0.04, 0.07, 0.08',
      'User      tty   login@   idle   JCPU   PCPU  what',
      ...Object.entries(USERS).filter(([_, i]) => !i.login.includes('not logged')).map(([u, info]) =>
        `${u.padEnd(9)} ${info.login.split('/').pop().padEnd(6)} ${(Math.random()*24).toFixed(0)}:${(Math.random()*60).toFixed(0).padStart(2,'0')}   ${info.idle.padEnd(6)} 0:01    0:01  ${['emacs','elm','rn','-csh','vi'][Math.floor(Math.random()*5)]}`
      ),
      `${HANDLE.padEnd(9)} ttyp4  3:47am   0:00    0:00    0:00  -csh`,
    ].join('\n');
  },
  whoami() { return HANDLE; },
  last(args) {
    const user = args[0] || '';
    const entries = [
      [HANDLE, 'ttyp4', '141.211.144.5', 'Fri May 12 03:47   still logged in'],
      ['guest', 'ttyp7', 'dialup21.um.edu', 'Thu May 11 21:14 - 23:08 (01:54)'],
      ['guest', 'ttyp2', 'dialup8.um.edu',  'Thu May 11 14:22 - 14:25 (00:03)'],
      ['kpryor', 'console', '-', 'Thu May 11 09:00 - 18:30 (09:30)'],
      ['aharper', 'ttyp3', 'mac.eng.um.edu', 'Mon Mar 04 22:18 - 22:19 (00:01)  1993'],
      ['guest', 'ttyp1', 'dialup1.um.edu',  'Mon May 08 02:14 - 02:33 (00:19)'],
    ];
    const filtered = user ? entries.filter(e => e[0] === user) : entries;
    return filtered.map(e => `${e[0].padEnd(10)} ${e[1].padEnd(8)} ${e[2].padEnd(20)} ${e[3]}`).join('\n');
  },
  date() {
    return 'Fri May 12 03:47:' + String(Math.floor(Math.random()*60)).padStart(2,'0') + ' EST 1995';
  },
  ps(args) {
    const lines = [
      '  PID TT  STAT TIME COMMAND',
      '   1 ?   IW   0:14 /sbin/init',
      '  47 ?   S    0:02 /usr/lib/sendmail -bd -q15m',
      '  89 ?   IW   0:00 in.fingerd',
      ' 412 p4  S    0:00 -csh',
      ' 419 p4  R    0:00 ps' + (args.includes('-aux') || args.includes('aux') ? ' -aux' : ''),
    ];
    if (args.includes('-aux') || args.includes('aux')) {
      return [
        'USER     PID %CPU %MEM   VSZ  RSS TT  STAT TIME COMMAND',
        'root       1  0.0  0.2   528  236 ?   IW   0:14 /sbin/init',
        'root      47  0.0  0.5   840  500 ?   S    0:02 /usr/lib/sendmail',
        'mwilson  217  0.1  1.8  3120 1872 12  S    0:14 emacs thesis.tex',
        'jchen    288  0.0  0.6   876  600 p3  IW   0:00 -csh',
        'kpryor   301  0.0  1.4  2040 1404 co  S    1:42 zsh',
        'tcooper  377  0.0  0.5   840  500 15  IW   0:08 telnet',
        'guest    412  0.0  0.5   840  500 p4  S    0:00 -csh',
        'guest    419  0.0  0.1   220  100 p4  R    0:00 ps -aux',
      ].join('\n');
    }
    return lines.join('\n');
  },
  mail() {
    return COMMANDS.cat(['/var/mail/guest']);
  },
  echo(args) { return args.join(' '); },
  uname(args) {
    if (args.includes('-a')) return 'SunOS shell.umich.edu 4.1.3 1 sun4c';
    return 'SunOS';
  },
  clear() { return '\x1b[2J'; },  // jquery.terminal 用 .clear()
  motd() { return COMMANDS.cat(['/etc/motd']); },
  exit() { exitRoom(); return ''; },
  logout() { exitRoom(); return ''; },
  // Easter eggs
  rm(args) {
    if (args.includes('-rf') && args.includes('/')) return 'rm: cannot remove `/`: I will not.';
    return `rm: ${args[args.length-1] || '?'}: Permission denied`;
  },
  sudo() { return 'sudo: command not found (this is 1995, dummy. use /bin/su)'; },
  curl() { return 'csh: curl: Command not found.'; },
  wget() { return 'csh: wget: Command not found.'; },
  git() { return 'csh: git: Command not found.'; },
  vi() { return '~\n~\n~\n[New File]\n[press :q to escape but you can\'t]\n(just kidding, vi not implemented · type help)'; },
  emacs() { return COMMANDS.vi(); },
  fortune() {
    const f = [
      'You will be hungry again in one hour.',
      "Do not believe everything you read on the net.",
      'A long-forgotten loved one will appear soon.\nBuy the negatives at any price.',
      "If you can read this you're too close.",
      'The world is coming to an end!  Save your buffers!',
    ];
    return f[Math.floor(Math.random() * f.length)];
  },
};

// ============================================================
// 启动: login prompt → MOTD → shell
// ============================================================
const term = $('#term').terminal(function(line) {
  const parts = line.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  if (!cmd) return;
  if (COMMANDS[cmd]) {
    const out = COMMANDS[cmd](args);
    if (cmd === 'clear') { this.clear(); return; }
    if (out) this.echo(out);
  } else {
    this.echo(`csh: ${cmd}: Command not found.`);
  }
}, {
  greetings: false,
  prompt: () => `<span class="green">${HANDLE}@shell</span>:<span class="cyan">${cwd}</span><span class="yellow">$</span> `,
  exit: false,
  history: true,
  historySize: 100,
  completion: function(s) {
    const cmds = Object.keys(COMMANDS);
    const node = fsGet(cwd);
    const files = node && node.type === 'dir' ? (node.children || []) : [];
    return cmds.concat(files);
  },
  onInit: async function() {
    this.echo('+--------------------------------------------------------------+');
    this.echo('|   University of Michigan · Computer Aided Engineering Net    |');
    this.echo('|   shell.umich.edu · Sun4/110 SunOS Release 4.1.3 (1994-08)   |');
    this.echo('+--------------------------------------------------------------+');
    this.echo('');
    await sleep(800);
    this.echo('login: <span class="player">' + HANDLE + '</span>');
    await sleep(300);
    this.echo('Password: <span class="dim">(echo off)</span>');
    await sleep(500);
    // Sprint 1: 真"上次登录"基于 NOCLIP 访问历史
    const visitInfo = window.NOCLIP ? window.NOCLIP.visitInfo('unix') : { isReturn: false };
    if (visitInfo.isReturn && visitInfo.lastBefore) {
      const ago = window.NOCLIP.timeAgo(visitInfo.lastBefore);
      this.echo('Last login: <span class="yellow">' + ago + '</span> from dialup21.um.edu  (count: ' + visitInfo.count + ')', { raw: true });
    } else {
      this.echo('Last login: Thu May 11 21:14:33 from dialup21.um.edu', { raw: true });
    }
    this.echo('You have <span class="yellow">2</span> new mail. Type <span class="yellow">mail</span> to read.', { raw: true });
    this.echo('');
    this.echo(COMMANDS.motd());
    this.echo('Type <span class="yellow">help</span> for a list of commands.', { raw: true });
    this.echo('');
  }
});

const sleep = ms => new Promise(r => setTimeout(r, ms));

function exitRoom() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'nextDoor', from: 'unix-dialup' }, '*');
  } else {
    if (confirm('logout & disconnect?')) window.close();
  }
}

// Ctrl-D = exit
$(document).on('keydown', (e) => {
  if (e.ctrlKey && e.key === 'd') { e.preventDefault(); exitRoom(); }
  if (e.key === 'Escape') exitRoom();
});

// Sprint 1: 共用 NOCLIP 时钟 (跨房一致) + handle 显示
function tickClock() {
  const t = window.NOCLIP ? window.NOCLIP.refreshTime() : null;
  document.getElementById('online-time').textContent =
    t ? (t.ampm_str + ' EST') : '03:47 AM EST';
}
tickClock();
setInterval(tickClock, 20000);
document.getElementById('user-info').textContent = HANDLE + '@tty04';
</script>
